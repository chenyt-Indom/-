// 天气逐时卡片（集成中国天气智能体：wttr.in实时数据 + 空气质量 + AI天气助手）
async function showWeatherHourly(dayIdx) {
  if (!tripData || !tripData.itinerary) return;
  const day = tripData.itinerary[dayIdx];
  if (!day) return;
  const dest = tripData.destination;
  const date = day.date;
  if (!date) return;

  const card = document.getElementById('weatherHourlyCard');
  card.innerHTML = '<div style="text-align:center;padding:40px"><span style="font-size:32px">🌤️</span><div style="color:#999;margin-top:8px">中国天气智能体加载中...</div></div>';
  document.getElementById('weatherHourlyOverlay').classList.add('show');

  try {
    const [hourlyRes, aqiRes] = await Promise.all([
      fetch(API + `/api/weather-hourly?city=${encodeURIComponent(dest)}&date=${encodeURIComponent(date)}`),
      fetch(API + `/api/china-weather/air-quality?city=${encodeURIComponent(dest)}`)
    ]);
    const data = await hourlyRes.json();
    const aqiData = await aqiRes.json();

    // 非当天：显示提示信息
    if (!data.is_today) {
      var w = tripData.itinerary[dayIdx].weather || {};
      card.innerHTML = '<div class="wh-header"><div class="wh-date">' + date + ' ' + dest + '</div><div class="wh-summary">' + (data.summary||w.desc||'') + ' ' + (w.temp||'') + '</div></div>' +
        '<div style="text-align:center;padding:30px;color:#999;font-size:16px;line-height:1.8">📅 逐时天气详情仅当天可用<br><span style="font-size:14px">当前日期：' + new Date().toLocaleDateString('zh-CN') + '</span><br><span style="font-size:14px;color:#4A90D9">届时将显示每小时的天气变化</span></div>' +
        '<button class="wh-close" onclick="closeWeatherHourly()">关闭</button>';
      return;
    }

    if (!data.success) { card.innerHTML = '<div style="text-align:center;padding:40px;color:#999">天气数据暂不可用</div><button class="wh-close" onclick="closeWeatherHourly()">关闭</button>'; return; }

    const emojiMap = { '晴':'☀️','Sunny':'☀️','Clear':'☀️','多云':'⛅','Partly cloudy':'⛅','Cloudy':'☁️','阴':'☁️','Overcast':'☁️','雨':'🌧️','Rain':'🌧️','Light rain':'🌦️','小雨':'🌦️','中雨':'🌧️','大雨':'🌧️','暴雨':'⛈️','雪':'❄️','Snow':'❄️','雾':'🌫️','Fog':'🌫️','Mist':'🌫️','霾':'🌫️','风':'💨','大风':'💨','雷阵雨':'⛈️','Thunder':'⛈️','Patchy rain':'🌦️','Light drizzle':'🌦️','Moderate rain':'🌧️','Heavy rain':'🌧️' };
    function getEmoji(w) { for (let k in emojiMap) { if ((w||'').includes(k)) return emojiMap[k]; } return '🌤️'; }

    const now = new Date();
    const currentHour = now.getHours();
    const cur = data.current || {};

    let html = `<div class="wh-header">
      <div class="wh-date">${date} ${dest}</div>
      <div class="wh-summary">${data.source||'中国天气智能体'}</div>
    </div>`;

    // 实时天气概览
    if (cur.temp) {
      html += `<div class="wh-current">
        <div class="wh-current-main">
          <div class="wh-current-temp">${cur.temp}</div>
          <div class="wh-current-desc">${getEmoji(cur.weather)} ${cur.weather}</div>
        </div>
        <div class="wh-current-detail">
          ${cur.feels_like ? `<div class="wh-detail-item"><span>体感</span><span class="wh-detail-val">${cur.feels_like}</span></div>` : ''}
          ${cur.humidity ? `<div class="wh-detail-item"><span>湿度</span><span class="wh-detail-val">${cur.humidity}</span></div>` : ''}
          ${cur.wind ? `<div class="wh-detail-item"><span>风力</span><span class="wh-detail-val">${cur.wind.split(' ')[0]||''}</span></div>` : ''}
          ${cur.uv ? `<div class="wh-detail-item"><span>紫外线</span><span class="wh-detail-val">${cur.uv}</span></div>` : ''}
          ${cur.visibility ? `<div class="wh-detail-item"><span>能见度</span><span class="wh-detail-val">${cur.visibility}</span></div>` : ''}
        </div>
      </div>`;
    }

    // 空气质量指数（中国天气智能体）
    if (aqiData.success && aqiData.aqi) {
      html += `<div class="wh-aqi" style="background:${aqiData.color}15;border:1px solid ${aqiData.color}40">
        <div class="wh-aqi-value" style="color:${aqiData.color}">${aqiData.aqi}</div>
        <div class="wh-aqi-info">
          <div class="wh-aqi-level" style="color:${aqiData.color}">空气${aqiData.level}</div>
          <div class="wh-aqi-desc">${aqiData.description}</div>
          <div class="wh-aqi-detail">
            ${aqiData.pm25 ? `<span>PM2.5 ${aqiData.pm25}</span>` : ''}
            ${aqiData.pm10 ? `<span>PM10 ${aqiData.pm10}</span>` : ''}
          </div>
        </div>
      </div>`;
    }

    // 极端天气预警
    if (data.extreme_alert && data.extreme_alert.has_alert) {
      html += '<div class="wh-alert-bar">';
      data.extreme_alert.alerts.forEach(a => {
        const bg = a.level === 'danger' ? '#FFE0E0' : '#FFF3E0';
        const color = a.level === 'danger' ? '#D32F2F' : '#E67E22';
        html += `<div style="background:${bg};color:${color};padding:6px 12px;border-radius:6px;font-size:14px;margin-bottom:4px">⚠️ ${a.message}</div>`;
      });
      html += '</div>';
    }

    // 官方天气预警
    if (data.alerts && data.alerts.length) {
      html += '<div class="wh-alert-bar">';
      data.alerts.forEach(a => {
        html += `<div style="background:#FFE0E0;color:#D32F2F;padding:6px 12px;border-radius:6px;font-size:14px;margin-bottom:4px">🚨 ${a.headline||a.event||'天气预警'}</div>`;
      });
      html += '</div>';
    }

    // 逐时天气网格（3小时间隔）
    html += '<div class="wh-grid">';
    (data.hours||[]).forEach(h => {
      const hNum = parseInt(h.time);
      const isNow = hNum === currentHour || hNum === currentHour - 1 || hNum === currentHour - 2;
      html += `<div class="wh-item${isNow ? ' now' : ''}">
        <div class="wh-time">${h.time}${isNow ? ' 现在' : ''}</div>
        <div class="wh-emoji">${getEmoji(h.weather)}</div>
        <div class="wh-temp">${h.temp}</div>
        ${h.rain_chance && parseInt(h.rain_chance) > 30 ? `<div class="wh-rain">🌧️${h.rain_chance}</div>` : ''}
        ${h.wind ? `<div class="wh-wind">💨${h.wind.split(' ')[0]||''}</div>` : ''}
      </div>`;
    });
    html += '</div>';

    // 雨雪到来前1小时提醒
    let rainAlert = null;
    for (let i = 0; i < (data.hours||[]).length; i++) {
      const h = data.hours[i];
      const w = (h.weather||'').toLowerCase();
      if ((w.includes('rain') || w.includes('snow') || w.includes('雨') || w.includes('雪')) && parseInt(h.rain_chance) > 50) {
        const hNum = parseInt(h.time);
        if (hNum - currentHour > 0 && hNum - currentHour <= 2) {
          rainAlert = `预计${h.time}左右将有${h.weather}，请提前做好准备`;
          break;
        }
      }
    }
    if (rainAlert) {
      html += `<div class="wh-rain-alert">⏰ ${rainAlert}</div>`;
    }

    // AI天气助手按钮
    html += `<button class="wh-ai-btn" onclick="askWeatherAI('${dest.replace(/'/g,"\\'")}')" id="whAiBtn">🤖 问问中国天气智能体</button>`;
    html += `<div class="wh-ai-loading" id="whAiLoading">⏳ AI正在分析天气...</div>`;
    html += `<div class="wh-ai-reply" id="whAiReply"></div>`;

    html += '<button class="wh-close" onclick="closeWeatherHourly()">关闭</button>';
    card.innerHTML = html;
  } catch(e) {
    card.innerHTML = '<div style="text-align:center;padding:40px;color:#999">加载失败，请重试</div><button class="wh-close" onclick="closeWeatherHourly()">关闭</button>';
  }
}

// AI天气助手对话
async function askWeatherAI(city) {
  const btn = document.getElementById('whAiBtn');
  const loading = document.getElementById('whAiLoading');
  const reply = document.getElementById('whAiReply');
  if (!btn || !loading || !reply) return;
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';
  loading.classList.add('show');
  reply.classList.remove('show');
  try {
    const res = await fetch(API + `/api/china-weather/chat?city=${encodeURIComponent(city)}&query=${encodeURIComponent('出行建议')}`);
    const data = await res.json();
    if (data.reply) {
      reply.textContent = '💡 ' + data.reply;
      reply.classList.add('show');
    }
  } catch(e) {
    reply.textContent = '天气助手暂时不可用，请稍后重试';
    reply.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 问问中国天气智能体';
    loading.classList.remove('show');
  }
}

let weatherAlertTimer = null;

}
function closeAlert() { document.getElementById('alertBar').classList.remove('show'); }
// 启动天气预警定时检查（每10分钟）
function startWeatherAlerts() {
  if (weatherAlertTimer) clearInterval(weatherAlertTimer);
  checkWeatherAlerts();
  weatherAlertTimer = setInterval(checkWeatherAlerts, 600000);
}
// 雨雪来临前1小时提醒（需要逐时数据支持）
async function checkRainSnowAlert() {
  if (!tripData || !tripData.destination || !tripData.itinerary) return;
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  // 查找今天是否有行程
  const todayDay = (tripData.itinerary||[]).find(d => d.date === todayStr);
  if (!todayDay) return;
  try {
    const res = await fetch(API + `/api/weather-hourly?city=${encodeURIComponent(tripData.destination)}&date=${encodeURIComponent(todayStr)}`);
    const data = await res.json();
    if (!data.success || !data.hours) return;
    const nowHour = today.getHours();
    // 检查接下来1-2小时是否有雨雪
    const rainSnow = ['雨','雪','暴雨','大雨','中雨','小雨','雷阵雨','暴雪','大雪','中雪','小雪'];
    const nextHour = data.hours.find(h => {
      const hh = parseInt(h.time);
      return hh >= nowHour && hh <= nowHour + 2 && rainSnow.some(r => h.weather.includes(r));
    });
    if (nextHour) {
      const bar = document.getElementById('alertBar');
      const msg = document.getElementById('alertMsg');
      msg.textContent = `🌧️ ${nextHour.time}左右将有${nextHour.weather}，请提前做好准备！`;
      if (nextHour.weather.includes('雪')) bar.className = 'alert-bar snow show';
      else bar.className = 'alert-bar show';
    }
  } catch(e) {}
}

    document.getElementById('regenerateLoadingOverlay').classList.remove('show');
  }
}

// 更新总览地图标记（重新生成计划后）
function updateOverviewMarkers() {
  if (!tripData) return;
  allMarkers = [];
  let globalOrder = 1;
  (tripData.itinerary||[]).forEach(day => {
    ['morning','afternoon','evening'].forEach(slot => {
      const s = day[slot];
      if(s && s.spot && s.location){
        const [lng, lat] = s.location.split(',').map(Number);
        if (!isNaN(lng) && !isNaN(lat)) {
          allMarkers.push({ name: s.spot, lng, lat, order: globalOrder, day: day.day });
          globalOrder++;
        }
      }
    });
  });
  const bk = tripData.booking_info || {};
  (bk.hotels || []).forEach(h => {
    if (h.location) {
      const [lng, lat] = h.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: h.name, lng, lat, order: globalOrder, day: 0, type: 'hotel' });
        globalOrder++;
      }
    }
  });
  (bk.tickets || []).forEach(t => {
    if (t.location && t.need_booking) {
      const [lng, lat] = t.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: t.spot, lng, lat, order: globalOrder, day: 0, type: 'ticket' });
        globalOrder++;
      }
    }
  });
  // 如果总览页正在显示，刷新地图
  if (document.getElementById('overviewPage').style.display === 'flex') {
    initOverviewMap(allMarkers);
  }
}

// 实时监测
function toggleMonitor() {
  if (monitorTimer) { stopMonitor(); } else { startMonitor(); }
}
function startMonitor() {
  if (monitorStopped) return;
  const btn = document.getElementById('btnMonitor');
  btn.textContent = '监测中...';
  btn.style.background = '#E67E22';
  btn.style.color = '#fff';
  btn.style.borderColor = '#E67E22';
  monitorRejected = false;
  checkTripStatus();
  monitorTimer = setInterval(checkTripStatus, 300000);
}
function stopMonitor() {
  if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; }
  const btn = document.getElementById('btnMonitor');
  btn.textContent = '开启实时监测';
  btn.style.background = '#fff';
  btn.style.color = '#4A90D9';
  btn.style.borderColor = '#4A90D9';
  document.getElementById('monitorNotification').classList.remove('show');
}
async function checkTripStatus() {
  if (!tripData || monitorStopped) return;
  try {
    let currentLocation = {};
    if (navigator.geolocation) {
      try {
        const pos = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 5000, maximumAge: 300000});
        });
        currentLocation = {lng: pos.coords.longitude, lat: pos.coords.latitude};
      } catch (e) {}
    }
    const res = await fetch(API + '/api/monitor-trip', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({trip_data: tripData, current_location: currentLocation, rejected: monitorRejected})
    });
    const data = await res.json();
    if (data.success && data.has_alert && data.suggestion) {
      showMonitorNotification(data.alerts, data.suggestion);
    }
  } catch (e) {}
}
function showMonitorNotification(alerts, suggestion) {
  const notif = document.getElementById('monitorNotification');
  document.getElementById('monitorTitle').textContent = '⚠️ 突发情况提醒';
  let body = '';
  if (alerts) alerts.forEach(a => { body += '<div style="margin-bottom:4px">• ' + a.message + '</div>'; });
  body += '<div style="margin-top:8px;color:#4A90D9;font-weight:500">💡 建议：' + suggestion + '</div>';
  document.getElementById('monitorBody').innerHTML = body;
  notif.classList.add('show');
  notif._suggestion = suggestion;
}
function acceptMonitorSuggestion() {
  document.getElementById('monitorNotification').classList.remove('show');
  var notif = document.getElementById('monitorNotification');
  document.getElementById('newPlanInput').value = notif._suggestion || '';
  document.getElementById('newPlanInput').focus();
}
function rejectMonitorSuggestion() {
  monitorRejected = true;
  document.getElementById('monitorNotification').classList.remove('show');
}
window._stopMonitorPermanent = function() {
  monitorStopped = true;
  stopMonitor();
  document.getElementById('monitorNotification').classList.remove('show');
  var btn = document.getElementById('btnMonitor');
  btn.textContent = '已停止监测';
  btn.disabled = true;
};

// 判断是否为当天
function checkIfToday(dateStr) {
  if (!dateStr) return false;
  var d = dateStr.replace(/年|月/g, '-').replace(/日/g, '');
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  var parts = d.split('-');
  if (parts.length === 3) {
    return parts[0] + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0') === todayStr;
  }
  return d === todayStr;
}
