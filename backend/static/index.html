<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行旅白 AI 旅行规划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;min-height:100vh;color:#333}
.container{max-width:420px;margin:0 auto;padding:40px 24px 32px}
.header{text-align:center;margin-bottom:40px}
.header-top{display:flex;align-items:center;justify-content:center;gap:12px}
.logo{font-size:48px;font-weight:900;color:#4A90D9;letter-spacing:6px}
.city-badge{display:inline-flex;align-items:center;gap:4px;background:#EEF4FB;color:#4A90D9;padding:8px 16px;border-radius:20px;font-size:16px;cursor:pointer;border:1px solid #d0e4f7;margin-top:10px;transition:opacity .3s}
.city-badge.disabled{pointer-events:none;opacity:.5;background:#f0f0f0;color:#999;border-color:#e0e0e0}
.city-badge .city-icon{font-size:18px;pointer-events:none}
.city-badge .city-name{font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.city-badge .city-edit{font-size:12px;opacity:.6;pointer-events:none}
.locate-type{font-size:11px;color:#E67E22;opacity:.8;pointer-events:none}
.title{font-size:28px;color:#333;font-weight:500;margin-top:8px}
.subtitle{font-size:18px;color:#999;margin-top:10px}
.form-card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 4px 24px rgba(74,144,217,0.08);border:1px solid #eef4fb}
.form-item{margin-bottom:24px}
.label{font-size:20px;color:#333;font-weight:500;margin-bottom:12px;display:block}
.input{width:100%;border:1px solid #e8e8e8;border-radius:12px;padding:16px 18px;font-size:20px;background:#f9fafb;color:#333;outline:none;transition:border-color .2s}
.input:focus{border-color:#4A90D9}
.date-row{display:flex;align-items:center;gap:10px}
.date-picker{flex:1;min-width:0;border:1px solid #e8e8e8;border-radius:12px;padding:14px 10px;font-size:16px;background:#f9fafb;color:#333;cursor:pointer;text-align:center}
.date-picker.placeholder{color:#999}
.date-arrow{font-size:24px;color:#4A90D9;font-weight:600;flex-shrink:0}
.days-hint{text-align:right;margin-top:8px;font-size:16px;color:#666}
.days-num{color:#4A90D9;font-size:24px;font-weight:700}
.tag-group{display:flex;flex-wrap:wrap;gap:12px}
.tag{padding:10px 22px;border-radius:24px;font-size:18px;color:#666;background:#f5f5f5;cursor:pointer;transition:all .2s;border:none;user-select:none}
.tag.active{color:#fff;background:#4A90D9}
/* 预算类型切换 */
.budget-type-row{display:flex;gap:0;margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid #e8e8e8}
.budget-type-btn{flex:1;padding:12px 0;text-align:center;font-size:16px;cursor:pointer;background:#f9fafb;color:#666;border:none;transition:all .2s}
.budget-type-btn.active{background:#4A90D9;color:#fff;font-weight:600}
/* 人数输入 */
.people-row{display:flex;align-items:center;gap:8px}
.people-input{width:80px;text-align:center;border:1px solid #e8e8e8;border-radius:12px;padding:14px 8px;font-size:20px;background:#f9fafb;color:#333;outline:none}
.people-input:focus{border-color:#4A90D9}
.people-btn{width:40px;height:40px;border-radius:50%;border:1px solid #e8e8e8;background:#f9fafb;font-size:22px;color:#4A90D9;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
.people-btn:hover{background:#EEF4FB}
.people-hint{font-size:14px;color:#999;margin-left:8px}
/* 节奏滑块 */
.pace-slider-wrap{position:relative;padding:0 4px}
.pace-slider{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:linear-gradient(to right,#7BC67E,#F5A623,#E74C3C);outline:none;cursor:pointer}
.pace-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid #4A90D9;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.pace-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:14px;color:#999}
.pace-label.active{color:#4A90D9;font-weight:600}
.pace-val{text-align:center;font-size:16px;color:#4A90D9;font-weight:600;margin-top:4px}
.btn-generate{width:100%;height:72px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border-radius:40px;font-size:24px;font-weight:600;margin-top:16px;border:none;cursor:pointer;transition:opacity .2s}
.btn-generate:disabled{opacity:.7;cursor:not-allowed}
/* 控件禁用状态 */
.form-card.disabled .input,.form-card.disabled .date-picker,.form-card.disabled .people-input,.form-card.disabled .tag,.form-card.disabled .budget-type-btn,.form-card.disabled .people-btn,.form-card.disabled .pace-slider{pointer-events:none;opacity:.5;background:#f0f0f0;color:#999}
.form-card.disabled .tag.active{background:#b0c4de;color:#fff}
.form-card.disabled .pace-slider::-webkit-slider-thumb{background:#ddd;border-color:#999}
.form-card.disabled{pointer-events:none}
.form-card.disabled .btn-generate{pointer-events:none;opacity:.5}
.btn-content{display:flex;align-items:center;justify-content:center;height:100%}
.btn-content.loading{gap:8px}
.loading-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
.loading-text{color:#fff;font-size:18px;margin-left:8px;transition:opacity .3s}
@keyframes bounce{to{transform:translateY(-6px);opacity:.5}}

/* 总览地图页 */
.overview-container{max-width:420px;margin:0 auto;display:none;flex-direction:column;height:100vh}
.overview-header{text-align:center;padding:16px;background:#4A90D9;color:#fff;position:relative}
.overview-header h2{font-size:22px;font-weight:500}
.fav-btn{position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:rgba(255,255,255,.5);transition:color .3s,transform .2s;z-index:1}
.fav-btn:hover{transform:scale(1.2)}
.fav-btn.favorited{color:#FFD700;animation:favPop .3s ease}
@keyframes favPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.fav-hint{position:absolute;top:48px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;padding:2px 8px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none}
.fav-btn:hover .fav-hint,.fav-hint.show{opacity:1}
.day-list{flex:0 0 42%;background:#fff;overflow-y:auto;padding:0 20px}
.day-summary{border-bottom:1px solid #f0f0f0}
.day-summary-header{display:flex;align-items:center;padding:14px 0;cursor:pointer}
.day-label{background:#4A90D9;color:#fff;font-size:14px;font-weight:600;padding:3px 10px;border-radius:12px;margin-right:10px}
.day-summary-date{font-size:16px;color:#999;flex:1}
.day-arrow{font-size:12px;color:#999}
.day-spots{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),padding .3s ease,opacity .3s ease;opacity:0;padding:0 0 0 12px}
.day-spots.show{max-height:600px;opacity:1;padding:0 0 14px 12px}
.day-spot{display:flex;align-items:center;padding:6px 0}
.spot-num{width:28px;height:28px;border-radius:50%;background:#EEF4FB;color:#4A90D9;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.spot-info{flex:1}
.spot-name{font-size:18px;color:#333;font-weight:500;display:block}
.spot-time{font-size:14px;color:#999}
.spot-loc-icon{font-size:20px;cursor:pointer;padding:2px}
.map-panel{flex:1;position:relative;background:#f5f6f8;min-height:0}
#overviewMapContainer{width:100%;height:100%}
.map-legend-overview{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:6px 16px;border-radius:16px;font-size:14px;z-index:10;pointer-events:none}
.overview-bottom{background:#fff;padding:16px 30px 28px}
.spot-summary{text-align:center;margin-bottom:8px;font-size:16px;color:#666}
.btn-detail{width:100%;height:52px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border-radius:28px;font-size:20px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
.btn-overview-back{width:100%;height:52px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:28px;font-size:20px;cursor:pointer}

/* 行程页 */
.trip-container{max-width:420px;margin:0 auto;padding:16px 24px 32px;background:#f5f6f8;min-height:100vh;display:none}
/* 详情页顶部新计划控件 */
.detail-top-controls{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.detail-top-controls .new-plan-input{width:100%;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;font-size:16px;background:#f9fafb;outline:none;margin-bottom:8px}
.detail-top-controls .new-plan-input:focus{border-color:#4A90D9}
.detail-top-controls .btn-row{display:flex;gap:8px}
.detail-top-controls .btn-regenerate-plan{flex:1;height:40px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
.detail-top-controls .btn-monitor{flex:1;height:40px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:10px;font-size:16px;cursor:pointer}
/* 监测通知弹窗 */
.monitor-notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:9999;max-width:380px;width:90%;display:none;animation:slideUp .3s ease}
.monitor-notification.show{display:block}
.monitor-notification .monitor-title{font-size:18px;font-weight:600;color:#E74C3C;margin-bottom:8px}
.monitor-notification .monitor-body{font-size:15px;color:#555;line-height:1.6;margin-bottom:12px}
.monitor-notification .monitor-btns{display:flex;gap:8px}
.monitor-notification .monitor-btn{flex:1;padding:10px;border-radius:8px;font-size:15px;cursor:pointer;border:none}
.monitor-notification .monitor-btn.accept{background:#4A90D9;color:#fff}
.monitor-notification .monitor-btn.reject{background:#f5f5f5;color:#666}
.monitor-notification .monitor-btn.no-more{background:none;color:#999;font-size:13px;text-align:center;width:100%;margin-top:6px;padding:6px;border:none;cursor:pointer}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* 重新生成加载卡片 */
.regenerate-loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:none;justify-content:center;align-items:center;z-index:10000}
.regenerate-loading-overlay.show{display:flex}
.regenerate-loading-card{background:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:340px;width:90%}
.regenerate-loading-card .rlc-icon{font-size:52px;margin-bottom:12px;animation:pulse 1.5s ease-in-out infinite}
.regenerate-loading-card .rlc-text{font-size:18px;font-weight:600;color:#333;margin-bottom:16px}
.regenerate-loading-card .rlc-sub{font-size:14px;color:#999;margin-bottom:8px}
.trip-header{text-align:center;padding:20px 0;margin-bottom:16px}
.trip-header h2{font-size:24px;color:#4A90D9}
.weather-bar{background:#fff;border-radius:12px;padding:16px 0;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04);display:flex;overflow-x:auto}
.weather-item{display:flex;flex-direction:column;align-items:center;padding:0 20px;min-width:100px;flex-shrink:0}
.w-icon{font-size:28px}.w-date{font-size:16px;color:#999;margin-top:4px}.w-desc{font-size:18px;color:#333;font-weight:500}.w-temp{font-size:16px;color:#4A90D9}
.day-card{background:#fff;border-radius:12px;padding:0 0 20px 0;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.04);overflow:hidden}
.card-header{padding:20px 20px 0 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.day-badge{background:#4A90D9;color:#fff;font-size:18px;font-weight:600;padding:4px 14px;border-radius:16px}
.day-date{font-size:18px;color:#999}
.day-weather{font-size:18px;color:#666;margin-left:auto}
.map-btn{display:flex;align-items:center;gap:4px;padding:6px 14px;background:#EEF4FB;border-radius:16px;cursor:pointer;border:none;font-size:15px;color:#4A90D9;font-weight:500}
.weather-img{width:100%;height:150px;object-fit:cover;margin-top:12px;border-radius:12px}
/* 天气渐变卡片（替代不可靠的图片API） */
.weather-card{width:100%;height:150px;margin-top:12px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;position:relative;overflow:hidden;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.weather-card .wc-icon{font-size:48px;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.weather-card .wc-desc{font-size:20px;font-weight:600;margin-bottom:2px}
.weather-card .wc-temp{font-size:16px;opacity:.9}
.weather-card .wc-hint{position:absolute;bottom:8px;right:12px;font-size:12px;opacity:.7}
.time-slot{padding:16px 20px 0 20px}
.slot-header{display:flex;align-items:center;margin-bottom:10px}
.slot-dot{width:8px;height:8px;border-radius:50%;margin-right:8px}
.slot-dot.morning{background:#F5A623}.slot-dot.afternoon{background:#4A90D9}.slot-dot.evening{background:#7B68EE}
.slot-title{font-size:22px;font-weight:600;color:#333;flex:1}
.map-pin{font-size:18px;cursor:pointer;padding:4px;opacity:.7;transition:opacity .2s}
.map-pin:hover{opacity:1}
.spot-img{width:100%;height:200px;border-radius:12px;object-fit:cover;margin-bottom:10px}
.spot-placeholder{width:100%;height:200px;border-radius:12px;margin-bottom:10px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;gap:8px}
.spot-placeholder .ph-spot-name{font-size:20px;font-weight:600;text-align:center;padding:0 16px}
.spot-placeholder .ph-hint{font-size:14px;opacity:.7}
.spot-name{font-size:24px;font-weight:600;color:#222;margin-bottom:6px}
.meta-tag{font-size:16px;color:#4A90D9;background:#EEF4FB;padding:3px 12px;border-radius:8px;display:inline-block;margin-right:6px}
.meta-tag.booking{color:#E67E22;background:#FFF3E0}
.spot-coord{display:flex;align-items:center;margin-top:6px;font-size:14px;color:#999}
.spot-coord .coord-icon{margin-right:4px}
.spot-reason{font-size:18px;color:#888;line-height:1.5;padding-bottom:4px;border-bottom:1px solid #f0f0f0;margin-top:6px}
.day-footer{padding:12px 20px 0 20px}
.footer-row{display:flex;align-items:center;padding:6px 0;font-size:18px}
.footer-icon{font-size:20px;margin-right:8px}
.footer-label{color:#666;font-weight:500;min-width:60px}
.footer-text{color:#333}
.bottom-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.bottom-title{font-size:24px;font-weight:600;color:#333;margin-bottom:14px;padding-left:12px;border-left:4px solid #4A90D9}
.budget-grid{display:flex;flex-wrap:wrap;gap:12px}
.budget-item{flex:1;min-width:28%;text-align:center;background:#f9fafb;border-radius:12px;padding:14px 8px}
.budget-name{font-size:18px;color:#999;display:block}.budget-value{font-size:22px;color:#4A90D9;font-weight:600;display:block;margin-top:4px}
/* 订票/酒店/门票 */
.booking-item{padding:12px 0;border-bottom:1px solid #f5f5f5}
.booking-item:last-child{border-bottom:none}
.booking-row{display:flex;align-items:center;padding:3px 0}
.booking-type{background:#4A90D9;color:#fff;font-size:14px;padding:2px 8px;border-radius:6px;margin-right:8px}
.booking-suggest{font-size:18px;color:#333;font-weight:500;flex:1}
.booking-hotel-name{font-size:20px;color:#333;font-weight:600}
.booking-area{font-size:16px;color:#999;flex:1}
.booking-price{font-size:18px;color:#E67E22;font-weight:600}
.booking-note{font-size:16px;color:#999;flex:1}
.booking-reason{font-size:16px;color:#666;padding:3px 0}
.ticket-item{background:#FFF8F0;margin:0 -20px;padding:12px 20px;border-radius:0}
.ticket-spot{font-size:18px;color:#333;font-weight:600;flex:1}
.ticket-price{font-size:18px;color:#E67E22}
.ticket-booking-warn{font-size:16px;color:#E74C3C;font-weight:500}
.ticket-platform{font-size:16px;color:#666}
.ticket-note{font-size:16px;color:#999;padding:3px 0}
.btn-book{width:100%;height:42px;background:#4A90D9;color:#fff;border-radius:21px;font-size:18px;margin-top:8px;border:none;cursor:pointer}
.btn-book.warn{background:#E67E22}
.btn-book-row{display:flex;gap:8px;margin-top:8px}
.btn-book-row .btn-book{flex:1;margin-top:0}
.btn-book-row .btn-map{flex:1;height:42px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:21px;font-size:18px;cursor:pointer}
.hotel-img{width:100%;height:160px;border-radius:12px;object-fit:cover;margin:8px 0;cursor:pointer}
.hotel-placeholder{width:100%;height:160px;border-radius:12px;margin:8px 0;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;gap:8px}
.hotel-placeholder .ph-hotel-name{font-size:18px;font-weight:600;text-align:center;padding:0 16px}
.hotel-placeholder .ph-hint{font-size:14px;opacity:.7}
.map-spot-num.hotel{background:#E74C3C}
.tip-item{display:flex;padding:8px 0;font-size:20px}
.tip-dot{color:#4A90D9;margin-right:10px;line-height:1.5}
.tip-text{color:#555;line-height:1.5}
.btn-share{width:100%;height:66px;background:#4A90D9;color:#fff;border-radius:40px;font-size:22px;cursor:pointer;margin-bottom:12px;border:none}
.btn-back{width:100%;height:66px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:40px;font-size:22px;cursor:pointer;margin-top:4px}

/* 地图弹窗 */
.map-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.map-overlay.show{display:flex}
.map-dialog{background:#fff;border-radius:16px;width:90%;max-width:400px;max-height:80vh;overflow:hidden}
.map-dialog-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.map-dialog-title{font-size:20px;font-weight:600;color:#333}
.map-close{font-size:24px;color:#999;cursor:pointer;border:none;background:none;padding:4px}
.map-dialog-body{padding:0;position:relative}
#dayMapContainer{width:100%;height:300px}
.map-spot-list{padding:12px 20px;max-height:200px;overflow-y:auto}
.map-spot-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5}
.map-spot-num{width:28px;height:28px;border-radius:50%;background:#4A90D9;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}
.map-spot-info{flex:1}
.map-spot-name{font-size:18px;font-weight:500;color:#333}
.map-spot-loc{font-size:14px;color:#999;margin-top:2px}
.map-spot-loc a{color:#4A90D9;text-decoration:none}
.map-spot-loc a:hover{text-decoration:underline}

/* 城市编辑弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:9999}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;padding:30px;border-radius:12px;width:80%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center;color:#333}
.modal-input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:20px;outline:none;box-sizing:border-box}
.modal-input:focus{border-color:#4A90D9}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.modal-btn.ok{background:#4A90D9;color:#fff}
.modal-btn.cancel{background:#f5f5f5;color:#333}

.history-section{margin-top:40px}
.history-header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #eee;cursor:pointer}
.history-title{font-size:20px;font-weight:600;color:#333}
.history-arrow{font-size:16px;color:#4A90D9}
.history-list{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease;opacity:0}
.history-list.show{max-height:800px;opacity:1;padding-top:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:16px 12px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.h-left{display:flex;align-items:center;gap:10px}
.h-dest{font-size:18px;color:#333;font-weight:500}
.h-days{font-size:14px;color:#4A90D9;background:#EEF4FB;padding:3px 10px;border-radius:8px}
.h-time{font-size:14px;color:#999}

/* 景点/酒店详情卡片弹窗 */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:10000}
.detail-overlay.show{display:flex}
.detail-card{background:#fff;border-radius:16px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.detail-img{width:100%;height:220px;object-fit:cover;border-radius:16px 16px 0 0}
.detail-placeholder{width:100%;height:220px;border-radius:16px 16px 0 0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:8px}
.detail-placeholder .ph-detail-name{font-size:22px;font-weight:600;text-align:center;padding:0 20px}
.detail-placeholder .ph-detail-hint{font-size:15px;opacity:.7}
.detail-body{padding:20px}
.detail-title{font-size:24px;font-weight:700;color:#222;margin-bottom:8px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.detail-meta-tag{font-size:14px;padding:4px 12px;border-radius:12px;background:#EEF4FB;color:#4A90D9}
.detail-meta-tag.warn{background:#FFF3E0;color:#E67E22}
.detail-desc{font-size:16px;color:#555;line-height:1.7;margin-bottom:14px}
.detail-section{margin-bottom:12px}
.detail-section-title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px}
.detail-section-text{font-size:15px;color:#666;line-height:1.5}
.detail-long-text{font-size:15px;color:#333;line-height:1.9;max-height:400px;overflow-y:auto;padding:8px 0}
.detail-long-text p{margin:0 0 12px 0;text-indent:2em}
.detail-close{display:block;width:100%;padding:14px;background:#f5f5f5;border:none;font-size:16px;color:#333;cursor:pointer;border-radius:0 0 16px 16px;margin-top:4px}
.detail-close:hover{background:#eee}
.btn-regenerate{display:block;width:100%;padding:12px;background:#fff;color:#E67E22;border:1px solid #E67E22;border-radius:10px;font-size:16px;cursor:pointer;margin:8px 0;transition:all .2s}
.btn-regenerate:hover{background:#FFF3E0}
/* 路线信息 */
.route-info{background:#EEF4FB;padding:10px 14px;border-radius:10px;margin:8px 0;font-size:14px;color:#4A90D9;line-height:1.5}
.route-info .ri-icon{margin-right:4px}
.route-info .ri-traffic{display:inline-block;padding:1px 8px;border-radius:6px;font-size:12px;margin-left:4px}
.route-info .ri-traffic.green{background:#52C41A;color:#fff}
.route-info .ri-traffic.orange{background:#FAAD14;color:#fff}
.route-info .ri-traffic.red{background:#FF4D4F;color:#fff}
/* 时间显示 */
.spot-time-range{font-size:16px;color:#4A90D9;font-weight:500;margin-top:4px}
.spot-time-range .sr-icon{margin-right:4px}

/* 天气逐时卡片 */
.weather-hourly-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:10000}
.weather-hourly-overlay.show{display:flex}
.weather-hourly-card{background:#fff;border-radius:16px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.wh-header{background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;padding:20px;border-radius:16px 16px 0 0;text-align:center}
.wh-date{font-size:20px;font-weight:600;margin-bottom:4px}
.wh-source{font-size:13px;opacity:.7;margin-top:4px}
.wh-summary{font-size:16px;opacity:.9}
.wh-current{display:flex;gap:16px;padding:16px;background:#f9fafb;border-bottom:1px solid #eee;align-items:center}
.wh-current-main{flex-shrink:0;text-align:center}
.wh-current-temp{font-size:48px;font-weight:700;color:#4A90D9;line-height:1}
.wh-current-desc{font-size:18px;color:#666;margin-top:4px}
.wh-current-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.wh-detail-item{display:flex;justify-content:space-between;font-size:13px;color:#999}
.wh-detail-val{font-weight:600;color:#555}
.wh-alert-bar{padding:8px 16px;margin:0 16px}
.wh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px}
.wh-item{text-align:center;padding:10px 4px;border-radius:10px;background:#f9fafb}
.wh-item.now{background:#EEF4FB;border:1px solid #4A90D9}
.wh-time{font-size:13px;color:#999;margin-bottom:4px}
.wh-emoji{font-size:22px;margin-bottom:2px}
.wh-temp{font-size:15px;color:#333;font-weight:600}
.wh-rain{font-size:12px;color:#3498DB;margin-top:2px}
.wh-wind{font-size:12px;color:#999;margin-top:2px}
.wh-rain-alert{background:#3498DB;color:#fff;padding:12px 16px;margin:0 16px 8px;border-radius:8px;font-size:14px;text-align:center}
.wh-close{display:block;width:100%;padding:14px;background:#f5f5f5;border:none;font-size:16px;color:#333;cursor:pointer;border-radius:0 0 16px 16px}
/* 空气质量卡片 */
.wh-aqi{padding:12px 16px;margin:0 16px;border-radius:10px;display:flex;align-items:center;gap:12px}
.wh-aqi-value{font-size:36px;font-weight:700;line-height:1}
.wh-aqi-info{flex:1}
.wh-aqi-level{font-size:16px;font-weight:600;margin-bottom:2px}
.wh-aqi-desc{font-size:13px;color:#999}
.wh-aqi-detail{display:flex;gap:8px;margin-top:4px;font-size:12px;color:#666}
/* 天气助手按钮 */
.wh-ai-btn{display:block;width:calc(100% - 32px);margin:12px 16px;padding:12px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;text-align:center}
.wh-ai-btn:hover{opacity:.9}
.wh-ai-reply{background:#EEF4FB;margin:8px 16px;padding:14px;border-radius:10px;font-size:15px;color:#333;line-height:1.6;display:none}
.wh-ai-reply.show{display:block}
.wh-ai-loading{text-align:center;color:#4A90D9;font-size:14px;padding:8px;display:none}
.wh-ai-loading.show{display:block}
/* AI加载动画：三个跳动的圆点 */
.ai-loading{display:flex;gap:8px;justify-content:center}
.ai-loading span{width:10px;height:10px;border-radius:50%;background:#4A90D9;animation:aiBounce .6s infinite alternate}
.ai-loading span:nth-child(2){animation-delay:.2s}
.ai-loading span:nth-child(3){animation-delay:.4s}
@keyframes aiBounce{to{transform:translateY(-8px);opacity:.5}}

/* 极端天气预警条 */
.alert-bar{position:fixed;top:0;left:0;right:0;background:#E74C3C;color:#fff;padding:12px 20px;font-size:15px;text-align:center;z-index:9999;display:none;animation:slideDown .3s ease}
.alert-bar.show{display:flex;align-items:center;justify-content:center;gap:8px}
.alert-bar.snow{background:#3498DB}
.alert-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;margin-left:8px}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* 酒店图片 */
.hotel-img{width:100%;height:160px;object-fit:cover;border-radius:10px;margin:8px 0;cursor:pointer}
.spot-img{cursor:pointer}
.weather-img{cursor:pointer}

/* 图片加载失败时的占位卡片 */
.img-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;margin-bottom:10px;text-align:center}
.img-fallback .fb-icon{font-size:48px;margin-bottom:6px}
.img-fallback .fb-name{font-size:16px;font-weight:600;color:#fff;padding:0 12px;line-height:1.4}
.img-fallback .fb-hint{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}

/* route_detail 路线详情 */
.route-detail{font-size:15px;color:#4A90D9;background:#EEF4FB;padding:8px 12px;border-radius:8px;margin-top:6px;line-height:1.5}
.route-detail .route-icon{margin-right:4px}

/* 推荐游览路线 */
.recommend-routes{margin-top:8px;background:#F0F8E8;border-radius:10px;overflow:hidden}
.recommend-routes-header{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#E8F5D0;cursor:pointer;font-size:15px;font-weight:600;color:#4A7C2E}
.recommend-routes-header .rr-arrow{font-size:12px;transition:transform .3s}
.recommend-routes-header .rr-arrow.open{transform:rotate(90deg)}
.recommend-routes-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.recommend-routes-body.show{max-height:400px}
.recommend-routes-item{display:flex;gap:8px;padding:8px 14px;font-size:14px;color:#555;line-height:1.5;border-bottom:1px solid #E8F5D0}
.recommend-routes-item:last-child{border-bottom:none}
.recommend-routes-item .rr-num{width:22px;height:22px;border-radius:50%;background:#4A7C2E;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.recommend-routes-item .rr-text{flex:1}

/* 详情卡片中的推荐路线 */
.detail-route-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:14px;color:#555;line-height:1.5;border-bottom:1px solid #f0f0f0}
.detail-route-item:last-child{border-bottom:none}
.rr-num-detail{width:22px;height:22px;border-radius:50%;background:#4A7C2E;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* 换酒店推荐卡片 */
.hotel-change-card{background:#FFF8F0;padding:16px;border-radius:12px;margin-bottom:12px;border:1px dashed #E67E22}
.hotel-change-title{font-size:18px;font-weight:600;color:#E67E22;margin-bottom:8px}
.hotel-change-row{font-size:15px;color:#666;padding:3px 0}

/* 二维码分享 */
.qr-btn{display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;color:#666;padding:6px 14px;border-radius:16px;font-size:14px;cursor:pointer;border:none;margin-top:8px;transition:background .2s}
.qr-btn:hover{background:#EEF4FB;color:#4A90D9}
.qr-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:none;justify-content:center;align-items:center;z-index:10001}
.qr-overlay.show{display:flex}
.qr-card{background:#fff;border-radius:20px;padding:30px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:320px;width:90%}
.qr-card img{width:250px;height:250px;border-radius:8px;border:1px solid #eee}
.qr-card .qr-title{font-size:20px;font-weight:600;color:#333;margin-bottom:6px}
.qr-card .qr-sub{font-size:14px;color:#999;margin-bottom:16px}
.qr-card .qr-tip{font-size:13px;color:#999;margin-top:12px}
.qr-close{display:block;width:100%;margin-top:16px;padding:10px;background:#f5f5f5;border:none;border-radius:10px;font-size:16px;color:#333;cursor:pointer}

/* 图片预加载过渡页 */
.loading-page{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:none;justify-content:center;align-items:center;z-index:5000;flex-direction:column}
.loading-page.show{display:flex}
.loading-page-inner{text-align:center;padding:40px;max-width:360px;width:90%}
.loading-page-icon{font-size:64px;margin-bottom:16px;animation:pulse 1.5s ease-in-out infinite}
.loading-page-title{font-size:22px;font-weight:600;color:#333;margin-bottom:8px}
.loading-page-sub{font-size:15px;color:#999;margin-bottom:24px}
.loading-page-progress{font-size:14px;color:#4A90D9;margin:16px 0 12px}
.loading-page-bar{width:100%;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden}
.loading-page-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#4A90D9,#357ABD);border-radius:3px;transition:width .3s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}


</style>
</head>
<body>

<!-- 首页 -->
<div class="container" id="homePage">
  <div class="header">
    <div class="logo">行旅白</div>
    <div class="title">AI 旅行规划</div>
    <div class="subtitle">输入你的需求，AI 为你规划完美行程</div>
    <button class="qr-btn" onclick="showQR()">📱 分享给朋友</button>
    <div class="city-badge" id="cityBadge" onclick="editCity()">
      <span class="city-icon">📍</span>
      <span class="city-name" id="cityName">定位中...</span>
      <span class="locate-type" id="locateType"></span>
      <span class="city-edit">编辑</span>
    </div>
  </div>
  <div class="form-card">
    <div class="form-item">
      <label class="label">目的地</label>
      <input class="input" id="destination" placeholder="输入你想去的城市，如：杭州">
    </div>
    <div class="form-item">
      <label class="label">出行日期</label>
      <div class="date-row">
        <input type="date" class="date-picker" id="startDate" min="">
        <span class="date-arrow">→</span>
        <input type="date" class="date-picker" id="endDate" min="">
      </div>
      <div class="days-hint" id="daysHint" style="display:none">
        共 <span class="days-num" id="daysNum">0</span> 天行程
      </div>
    </div>
    <div class="form-item">
      <label class="label">预算</label>
      <div class="budget-type-row" id="budgetTypeRow">
        <button class="budget-type-btn active" data-type="total" onclick="switchBudgetType('total')">总预算</button>
        <button class="budget-type-btn" data-type="aa" onclick="switchBudgetType('aa')">AA制</button>
      </div>
      <input class="input" id="budget" placeholder="如：3000元、中等预算">
    </div>
    <div class="form-item">
      <label class="label">旅行人数</label>
      <div class="people-row">
        <button class="people-btn" onclick="changePeople(-1)">−</button>
        <input class="people-input" id="travelers" type="number" value="1" min="1" max="50" onchange="updatePeopleHint()">
        <button class="people-btn" onclick="changePeople(1)">+</button>
        <span class="people-hint" id="peopleHint">1人出行</span>
      </div>
    </div>
    <div class="form-item">
      <label class="label">游玩节奏</label>
      <div class="pace-slider-wrap">
        <input type="range" class="pace-slider" id="paceSlider" min="0" max="100" value="50" step="1" oninput="updatePace()">
        <div class="pace-labels">
          <span class="pace-label">🏖️ 休闲</span>
          <span class="pace-label">🚶 适中</span>
          <span class="pace-label">🏃 快速</span>
        </div>
        <div class="pace-val" id="paceVal">适中节奏</div>
      </div>
    </div>
    <div class="form-item">
      <label class="label">兴趣爱好（多选）</label>
      <div class="tag-group" id="tagGroup">
        <button class="tag" data-tag="美食">美食</button>
        <button class="tag" data-tag="人文">人文</button>
        <button class="tag" data-tag="户外">户外</button>
        <button class="tag" data-tag="亲子">亲子</button>
        <button class="tag" data-tag="摄影">摄影</button>
        <button class="tag" data-tag="购物">购物</button>
        <button class="tag" data-tag="自然">自然</button>
        <button class="tag" data-tag="网红">网红</button>
      </div>
    </div>
    <div class="form-item">
      <label class="label">出行方式</label>
      <div class="tag-group" id="transportGroup">
        <button class="tag active" data-tag="public" onclick="switchTransport('public')">公共交通</button>
        <button class="tag" data-tag="selfdrive" onclick="switchTransport('selfdrive')">自驾</button>
      </div>
    </div>
    <button class="btn-generate" id="btnGenerate">
      <div class="btn-content" id="btnNormal">一键生成攻略</div>
      <div class="btn-content loading" id="btnLoading" style="display:none">
        <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
        <span class="loading-text" id="progressText">AI 正在规划中...</span>
      </div>
    </button>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header" onclick="toggleHistory()">
      <span class="history-title">历史记录</span>
      <span class="history-arrow" id="historyArrow">展开</span>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- 图片预加载过渡页 -->
<div class="loading-page" id="loadingPage">
  <div class="loading-page-inner">
    <div class="loading-page-icon">🏞️</div>
    <div class="loading-page-title">正在获取图片</div>
    <div class="loading-page-sub">AI正在生成详细介绍，请稍候...</div>
    <div class="ai-loading"><span></span><span></span><span></span></div>
    <div class="loading-page-progress" id="loadProgress">0/0 张图片已加载</div>
    <div class="loading-page-bar"><div class="loading-page-bar-fill" id="loadBarFill"></div></div>
  </div>
</div>

<!-- 总览地图页 -->
<div class="overview-container" id="overviewPage">
  <div class="overview-header"><h2 id="overviewTitle">行程总览</h2></div>
  <div class="day-list" id="dayList"></div>
  <div class="map-panel">
    <div id="overviewMapContainer"></div>
    <div class="map-legend-overview" id="spotSummary">所有景点已标注</div>
  </div>
  <div class="overview-bottom">
    <button class="btn-detail" onclick="goToTrip()">查看详情</button>
    <button class="btn-overview-back" onclick="goHome()">返回首页</button>
  </div>
</div>

<!-- 行程详情页 -->
<div class="trip-container" id="tripPage">
  <div class="detail-top-controls">
    <input class="new-plan-input" id="newPlanInput" placeholder="输入新计划需求，如：增加一个景点、调整住宿...">
    <div class="btn-row">
      <button class="btn-regenerate-plan" onclick="regeneratePlan()">重新生成计划</button>
      <button class="btn-monitor" id="btnMonitor" onclick="toggleMonitor()">开启实时监测</button>
    </div>
  </div>
  <div class="trip-header"><h2 id="tripTitle"></h2></div>
  <div class="weather-bar" id="weatherBar"></div>
  <div id="dayCards"></div>
  <div id="transportCard"></div>
  <div id="budgetCard"></div>
  <div id="flightsCard"></div>
  <div id="hotelsCard"></div>
  <div id="ticketsCard"></div>
  <div id="bookingTipsCard"></div>
  <div id="tipsCard"></div>
  <button class="btn-share" onclick="shareTrip()">分享行程</button>
  <button class="btn-back" onclick="goToOverview()">返回总览地图</button>
</div>

<!-- 地图弹窗 -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-dialog">
    <div class="map-dialog-header">
      <span class="map-dialog-title" id="mapDialogTitle">景点路线</span>
      <button class="map-close" onclick="closeMap()">×</button>
    </div>
    <div class="map-dialog-body">
    <div id="dayMapContainer"></div>
    <div class="map-spot-list" id="daySpotList"></div>
  </div>
  </div>
</div>

<!-- 景点/酒店详情卡片弹窗 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>

<!-- 天气逐时卡片弹窗 -->
<div class="weather-hourly-overlay" id="weatherHourlyOverlay">
  <div class="weather-hourly-card" id="weatherHourlyCard"></div>
</div>

<!-- 极端天气预警条 -->
<div class="alert-bar" id="alertBar">
  <span id="alertMsg"></span>
  <button class="alert-close" onclick="closeAlert()">×</button>
</div>

<!-- 监测通知弹窗 -->
<div class="monitor-notification" id="monitorNotification">
  <div class="monitor-title" id="monitorTitle">突发情况提醒</div>
  <div class="monitor-body" id="monitorBody"></div>
  <div class="monitor-btns">
    <button class="monitor-btn accept" onclick="acceptMonitorSuggestion()">接受方案</button>
    <button class="monitor-btn reject" onclick="rejectMonitorSuggestion()">暂不调整</button>
  </div>
  <button class="monitor-btn no-more" onclick="stopMonitor()">不再提出新方案</button>
</div>

<!-- 重新生成加载卡片 -->
<div class="regenerate-loading-overlay" id="regenerateLoadingOverlay">
  <div class="regenerate-loading-card">
    <div class="rlc-icon">✨</div>
    <div class="rlc-text">AI正在按照您的想法重新规划路线</div>
    <div class="rlc-sub">请稍候，正在分析您的新需求...</div>
    <div class="ai-loading"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- 二维码分享弹窗 -->
<div class="qr-overlay" id="qrOverlay">
  <div class="qr-card">
    <div class="qr-title">行旅白</div>
    <div class="qr-sub">AI 旅行规划 · 扫一扫即刻体验</div>
    <img id="qrImage" src="" alt="二维码">
    <div class="qr-tip">微信 / 浏览器扫一扫即可打开</div>
    <button class="qr-close" onclick="closeQR()">关闭</button>
  </div>
</div>

<script>
(function() {
const API = window.location.origin;
let selectedTags = [];
let tripData = null;
let departureCity = '';
let budgetType = 'total';  // 预算类型：total=总预算, aa=AA制
let isSelfDrive = false;   // 是否自驾
let monitorTimer = null;   // 实时监测定时器
let monitorRejected = false;  // 用户是否拒绝过监测建议
let monitorStopped = false;   // 用户是否选择不再提示

// 出行方式切换
function switchTransport(type) {
  isSelfDrive = (type === 'selfdrive');
  document.querySelectorAll('#transportGroup .tag').forEach(b => {
    b.classList.toggle('active', b.dataset.tag === type);
  });
}

// 预算类型切换
function switchBudgetType(type) {
  budgetType = type;
  document.querySelectorAll('#budgetTypeRow .budget-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
}

// 生成图片兜底URL（用于景点/酒店图片）
function getFallbackImgUrl(name, type) {
  const dest = tripData ? tripData.destination : '';
  const prompt = type === 'weather'
    ? encodeURIComponent('weather landscape ' + name + ', photorealistic, 4K')
    : encodeURIComponent(name + ' ' + dest + ', travel photography, realistic, 4K');
  return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + prompt + '&image_size=landscape_16_9';
}

// 图片加载失败时的DOM替换兜底（100%可靠，不依赖任何外部资源）
function imgFallback(img, type, name, onClickFn) {
  // 如果src为空或无效，直接触发API搜索
  const dest = tripData ? tripData.destination : '';
  const query = name + (dest ? ' ' + dest : '');
  img.style.opacity = '0.5';
  // 优先尝试API搜索真实图片，失败则显示渐变占位卡
  fetch(API + '/api/spot-images?query=' + encodeURIComponent(query) + '&limit=3')
    .then(r => r.json())
    .then(data => {
      if (data.success && data.images && data.images.length > 0) {
        const newSrc = data.images[0].url;
        img.src = newSrc;
        img.style.opacity = '1';
        // 如果新URL也加载失败，显示渐变占位卡
        img.onerror = function() { showGradientFallback(img, type, name, onClickFn); };
        return;
      }
      showGradientFallback(img, type, name, onClickFn);
    })
    .catch(function() {
      // 第二次尝试：直接用text_to_image兜底
      const fallbackUrl = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + encodeURIComponent(name + ' ' + dest + ', travel photography, realistic, 4K') + '&image_size=landscape_16_9';
      img.src = fallbackUrl;
      img.style.opacity = '1';
      img.onerror = function() { showGradientFallback(img, type, name, onClickFn); };
    });
}

function showGradientFallback(img, type, name, onClickFn) {
  const colors = {
    spot:   { bg: 'linear-gradient(135deg, #4A90D9, #6DB3F2)', icon: '🏛️', w: '100%', h: '200px' },
    hotel:  { bg: 'linear-gradient(135deg, #E67E22, #F0A04B)', icon: '🏨', w: '100%', h: '160px' },
    weather:{ bg: 'linear-gradient(135deg, #5B9BD5, #7EC8E3)', icon: '🌤️', w: '100%', h: '150px' },
  };
  const c = colors[type] || colors.spot;
  const div = document.createElement('div');
  div.className = 'img-fallback';
  div.style.cssText = `width:${c.w};height:${c.h};background:${c.bg};cursor:pointer`;
  div.innerHTML = `<span class="fb-icon">${c.icon}</span><span class="fb-name">${name||''}</span><span class="fb-hint">点击查看详情</span>`;
  if (onClickFn) div.onclick = onClickFn;
  if (img && img.parentNode) img.parentNode.replaceChild(div, img);
}

// 二维码分享
function showQR() {
  const url = 'http://lvbaixing.top/app/';
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(url);
  document.getElementById('qrImage').src = qrSrc;
  document.getElementById('qrOverlay').classList.add('show');
}
function closeQR() {
  document.getElementById('qrOverlay').classList.remove('show');
}

// 旅行人数加减
function changePeople(delta) {
  const input = document.getElementById('travelers');
  let val = parseInt(input.value) || 1;
  val = Math.max(1, Math.min(50, val + delta));
  input.value = val;
  updatePeopleHint();
}
function updatePeopleHint() {
  const val = parseInt(document.getElementById('travelers').value) || 1;
  const hint = document.getElementById('peopleHint');
  if (val <= 1) hint.textContent = '1人出行';
  else if (val <= 2) hint.textContent = '情侣出游';
  else if (val <= 4) hint.textContent = '家庭/小团体';
  else if (val <= 8) hint.textContent = '中型团体';
  else hint.textContent = '大型团体';
}

// 游玩节奏滑块（连续拖曳 0-100）
function updatePace() {
  const v = parseInt(document.getElementById('paceSlider').value);
  let label;
  if (v <= 10) label = '极慢节奏';
  else if (v <= 25) label = '慢节奏';
  else if (v <= 40) label = '偏休闲';
  else if (v <= 55) label = '适中节奏';
  else if (v <= 70) label = '偏紧凑';
  else if (v <= 85) label = '快节奏';
  else label = '极快节奏';
  document.getElementById('paceVal').textContent = label;
}

// 定位：优先GPS精确坐标→逆地理编码，失败则IP定位兜底
async function locateCity() {
  const badge = document.getElementById('cityName');
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  // 第一步：尝试浏览器GPS定位
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject,
          { enableHighAccuracy: true, timeout: isMobile ? 15000 : 8000, maximumAge: 600000 });
      });
      const res = await fetch(API + `/api/regeo?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`);
      const data = await res.json();
      if (data.success && data.city) {
        departureCity = data.city;
        badge.textContent = departureCity;
        badge.title = 'GPS精确定位';
        return;
      }
    } catch(e) {
      // GPS失败原因：1)HTTP站点不支持 2)用户拒绝权限 3)定位超时
      console.log('GPS定位失败:', e.message);
    }
  } else {
    console.log('浏览器不支持GPS定位');
  }
  // 第二步：IP定位兜底
  badge.textContent = '定位中…';
  try {
    const res = await fetch(API + '/api/locate');
    const data = await res.json();
    if (data.success && data.city) {
      departureCity = data.city;
      badge.textContent = departureCity;
      badge.title = isMobile ? '基于IP定位，可能不准确，点击可手动修改' : 'IP定位';
      // 添加小提示标记
      const marker = document.getElementById('locateType');
      if (marker) marker.textContent = isMobile ? ' 📍(IP)' : '';
    } else {
      badge.textContent = '点击设置城市';
      badge.title = '定位失败，请手动设置';
    }
  } catch(e) {
    badge.textContent = '点击设置城市';
    badge.title = '定位失败，请手动设置';
  }
}
function editCity() {
  document.getElementById('cityModal').classList.add('show');
  document.getElementById('cityInput').value = departureCity || '';
  document.getElementById('cityInput').focus();
}
function confirmCity() {
  const val = document.getElementById('cityInput').value.trim();
  if (val) {
    departureCity = val;
    document.getElementById('cityName').textContent = departureCity;
  }
  document.getElementById('cityModal').classList.remove('show');
}
function cancelCity() {
  document.getElementById('cityModal').classList.remove('show');
}
locateCity();
// 用事件监听器绑定编辑按钮（兜底onclick可能被拦截）
document.getElementById('cityBadge').addEventListener('click', editCity);
let overviewMap = null;  // 总览页地图实例
let dayMap = null;       // 行程页弹窗地图实例
let allMarkers = [];     // 总览页所有标记点
const PROGRESS_TEXTS = [
  '正在查询目的地信息...',
  '正在获取景点数据...',
  '正在查询天气情况...',
  'AI 正在为你规划行程...',
  '正在查询机票酒店信息...',
  '正在生成美食推荐...',
  '即将完成，请稍候...',
];

function loadHistory() { try { return JSON.parse(localStorage.getItem('trip_history')||'[]'); } catch(e){ return []; } }
function saveToHistory(data) {
  let history = loadHistory();
  const idx = history.findIndex(h => h.destination===data.destination && h.days===data.days);
  const record = { id: Date.now(), destination: data.destination, days: data.days, budget: data.budget||'', time: new Date().toLocaleString(), data: data };
  if(idx>-1) history[idx]=record; else history.unshift(record);
  if(history.length>20) history.pop();
  localStorage.setItem('trip_history', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  const history = loadHistory();
  const sec = document.getElementById('historySection');
  if(history.length===0){ sec.style.display='none'; return; }
  sec.style.display='block';
  let html = '';
  history.forEach(h => {
    html += `<div class="history-item" onclick="loadHistoryTrip(${h.id})"><div class="h-left"><span class="h-dest">${h.destination}</span><span class="h-days">${h.days}日游</span></div><span class="h-time">${h.time}</span></div>`;
  });
  document.getElementById('historyList').innerHTML = html;
}
function toggleHistory() {
  const list = document.getElementById('historyList');
  const arrow = document.getElementById('historyArrow');
  if(list.classList.contains('show')){ list.classList.remove('show'); arrow.textContent='展开'; }
  else { list.classList.add('show'); arrow.textContent='收起'; }
}
function loadHistoryTrip(id) {
  const history = loadHistory();
  const record = history.find(h => h.id===id);
  if(record && record.data) { tripData = record.data; renderOverview(record.data); }
}

// 标签点击
document.querySelectorAll('#tagGroup .tag').forEach(btn => {
  btn.addEventListener('click', function(){
    const tag = this.dataset.tag;
    const idx = selectedTags.indexOf(tag);
    if(idx > -1){ selectedTags.splice(idx,1); this.classList.remove('active'); }
    else { selectedTags.push(tag); this.classList.add('active'); }
  });
});

// 日期选择器联动，限制从今天开始
const startEl = document.getElementById('startDate');
const endEl = document.getElementById('endDate');
// 获取今天日期（YYYY-MM-DD格式），设置min属性禁止选择过去日期
const today = new Date();
const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
startEl.setAttribute('min', todayStr);
endEl.setAttribute('min', todayStr);
// 开始日期变更时，结束日期同步min
startEl.addEventListener('change', function() {
  endEl.setAttribute('min', this.value);
  updateDays();
});
endEl.addEventListener('change', updateDays);
function updateDays() {
  const s = startEl.value, e = endEl.value;
  if (s && e) {
    const days = Math.max(1, Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1);
    document.getElementById('daysNum').textContent = days;
    document.getElementById('daysHint').style.display = 'block';
    return days;
  }
  document.getElementById('daysHint').style.display = 'none';
  return 0;
}

// 禁用/启用所有控件
function disableControls() {
  document.querySelector('.form-card').classList.add('disabled');
  var badge = document.getElementById('cityBadge');
  if (badge) badge.classList.add('disabled');
}
function enableControls() {
  document.querySelector('.form-card').classList.remove('disabled');
  var badge = document.getElementById('cityBadge');
  if (badge) badge.classList.remove('disabled');
}

// 生成攻略
let progressTimer = null;
document.getElementById('btnGenerate').addEventListener('click', async function(){
  const dest = document.getElementById('destination').value.trim();
  const days = updateDays();
  if(!dest){ alert('请输入目的地'); return; }
  if(days < 1){ alert('请选择出行日期'); return; }
  // 禁用所有控件
  disableControls();
  document.getElementById('btnNormal').style.display='none';
  document.getElementById('btnLoading').style.display='flex';
  this.disabled = true;
  let idx = 0;
  const progEl = document.getElementById('progressText');
  progEl.textContent = PROGRESS_TEXTS[0];
  progressTimer = setInterval(() => { idx=(idx+1)%PROGRESS_TEXTS.length; progEl.textContent=PROGRESS_TEXTS[idx]; }, 2000);
  try {
    const res = await fetch(API+'/api/generate-trip',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        destination: dest, days: days,
        budget: document.getElementById('budget').value,
        budget_type: budgetType,
        interests: selectedTags,
        start_date: startEl.value, end_date: endEl.value,
        departure_city: departureCity,
        travelers: parseInt(document.getElementById('travelers').value) || 1,
        pace: parseInt(document.getElementById('paceSlider').value),
        is_self_drive: isSelfDrive,
      })
    });
    clearInterval(progressTimer);
    const data = await res.json();
    if(data.success) { tripData = data.data; saveToHistory(data.data); await showLoadingAndPreload(data.data); }
    else { alert('攻略生成失败，请检查网络后重试\n'+(data.error||'')); }
  } catch(e){ clearInterval(progressTimer); alert('攻略生成失败，请检查网络后重试'); }
  finally {
    document.getElementById('btnNormal').style.display='flex';
    document.getElementById('btnLoading').style.display='none';
    this.disabled = false;
  }
});

// 图片预加载：收集所有图片URL并预加载，完成后显示总览页
async function showLoadingAndPreload(data) {
  // 隐藏首页，显示加载页
  document.getElementById('homePage').style.display='none';
  document.getElementById('tripPage').style.display='none';
  document.getElementById('overviewPage').style.display='none';
  const loadPage = document.getElementById('loadingPage');
  loadPage.classList.add('show');
  document.getElementById('loadProgress').textContent = '正在收集图片...';
  document.getElementById('loadBarFill').style.width = '0%';

  // 收集所有需要预加载的图片URL
  const imgTasks = [];
  (data.itinerary||[]).forEach(day => {
    const w = day.weather||{};
    if (w.image) imgTasks.push({url: w.image, type: 'weather', name: day.date});
    ['morning','afternoon','evening'].forEach(slot => {
      const s = day[slot];
      if (s && s.image) imgTasks.push({url: s.image, type: 'spot', name: s.spot});
    });
  });
  const bk = data.booking_info||{};
  (bk.hotels||[]).forEach(h => { if (h.image) imgTasks.push({url: h.image, type: 'hotel', name: h.name}); });
  (bk.hotel_changes||[]).forEach(h => { if (h.image) imgTasks.push({url: h.image, type: 'hotel', name: h.to_hotel}); });

  const total = imgTasks.length;
  document.getElementById('loadProgress').textContent = `0/${total} 张图片已加载`;
  document.getElementById('loadBarFill').style.width = '0%';

  if (total === 0) {
    loadPage.classList.remove('show');
    renderOverview(data);
    return;
  }

  // 预加载所有图片（带进度条）
  let loaded = 0;
  const updateProgress = () => {
    loaded++;
    const pct = Math.round(loaded / total * 100);
    document.getElementById('loadProgress').textContent = `${loaded}/${total} 张图片已加载`;
    document.getElementById('loadBarFill').style.width = pct + '%';
  };

  const preloadOne = (url) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => { updateProgress(); resolve(); };
    img.onerror = () => { updateProgress(); resolve(); };
    img.src = url;
    setTimeout(() => { updateProgress(); resolve(); }, 8000);
  });

  await Promise.all(imgTasks.map(t => preloadOne(t.url)));

  // 预加载完成后显示总览
  loadPage.classList.remove('show');
  renderOverview(data);
}

// 总览页
function renderOverview(data){
  tripData = data;
  document.getElementById('homePage').style.display='none';
  document.getElementById('tripPage').style.display='none';
  document.getElementById('overviewPage').style.display='flex';

  // 销毁旧地图
  if (dayMap) { dayMap.destroy(); dayMap = null; }

  document.getElementById('overviewTitle').textContent = data.destination + data.days + '日游行程总览';
  // 收藏按钮
  const favKey = `saved_trip_${data.destination}_${data.days}`;
  const isFav = !!localStorage.getItem(favKey);
  document.getElementById('overviewTitle').insertAdjacentHTML('afterend', 
    `<button class="fav-btn${isFav?' favorited':''}" id="favBtn" onclick="toggleFavorite()" title="收藏行程">
      ${isFav?'⭐':'☆'}<span class="fav-hint">${isFav?'已收藏':'点击收藏'}</span>
    </button>`);

  // 按天构建列表 + 收集所有景点坐标
  let allSpots = 0;
  let listHtml = '';
  allMarkers = [];
  let globalOrder = 1;

  (data.itinerary||[]).forEach((day, idx) => {
    const spots = [];
    ['morning','afternoon','evening'].forEach(slot => {
      const s = day[slot];
      if(s && s.spot){
        const [lng, lat] = (s.location||'').split(',').map(Number);
        if (!isNaN(lng) && !isNaN(lat)) {
          spots.push({ name: s.spot, time: slot==='morning'?'上午':slot==='afternoon'?'下午':'晚上', location: s.location, need_booking: s.need_booking, lng, lat, order: globalOrder });
          allMarkers.push({ name: s.spot, lng, lat, order: globalOrder, day: day.day });
          globalOrder++;
        } else {
          spots.push({ name: s.spot, time: slot==='morning'?'上午':slot==='afternoon'?'下午':'晚上', location: '', need_booking: s.need_booking });
        }
      }
    });
    allSpots += spots.length;
    listHtml += `<div class="day-summary">
      <div class="day-summary-header" onclick="toggleDay(${idx})">
        <span class="day-label">Day ${day.day}</span>
        <span class="day-summary-date">${day.date||''}</span>
        <span class="day-arrow" id="dayArrow${idx}">▶</span>
      </div>
      <div class="day-spots" id="daySpots${idx}">`;
    spots.forEach((s, si) => {
      listHtml += `<div class="day-spot">
        <span class="spot-num">${s.order||(si+1)}</span>
        <div class="spot-info"><span class="spot-name">${s.name}${s.need_booking?' ⚠需预约':''}</span><span class="spot-time">${s.time}</span></div>
        ${s.location ? `<span class="spot-loc-icon" onclick="focusSpot('${s.name}',${s.lat},${s.lng})">📍</span>` : ''}
      </div>`;
    });
    listHtml += `</div></div>`;
  });
  document.getElementById('dayList').innerHTML = listHtml;
  document.getElementById('spotSummary').textContent = `共 ${allMarkers.length} 个景点已标注`;

  // 收集酒店和门票预约位置到地图
  const bk = data.booking_info || {};
  (bk.hotels || []).forEach(h => {
    if (h.location) {
      const [lng, lat] = h.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: h.name, lng, lat, order: globalOrder, day: 0, type: 'hotel' });
        globalOrder++;
      }
    }
  });
  (bk.tickets || []).forEach(t => {
    if (t.location && t.need_booking) {
      const [lng, lat] = t.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: t.spot, lng, lat, order: globalOrder, day: 0, type: 'ticket' });
        globalOrder++;
      }
    }
  });
  document.getElementById('spotSummary').textContent = `共 ${allMarkers.length} 个地点已标注（含酒店、需预约景点）`;

  // 初始化高德地图
  initOverviewMap(allMarkers);
  window.scrollTo(0,0);
}

// 初始化总览页高德地图
function initOverviewMap(markers) {
  if (typeof AMap === 'undefined') { console.warn('高德地图 SDK 未加载'); return; }
  const container = document.getElementById('overviewMapContainer');
  if (!container) return;

  // 销毁旧地图
  if (overviewMap) { overviewMap.destroy(); overviewMap = null; }

  // 计算中心点
  let centerLng = 116.4, centerLat = 39.9;
  if (markers.length > 0) {
    centerLng = markers.reduce((s,m) => s + m.lng, 0) / markers.length;
    centerLat = markers.reduce((s,m) => s + m.lat, 0) / markers.length;
  }

  overviewMap = new AMap.Map('overviewMapContainer', {
    center: [centerLng, centerLat],
    zoom: markers.length > 1 ? 11 : 13,
    resizeEnable: true,
  });

  // 添加标记点
  markers.forEach(m => {
    let bgColor = '#4A90D9';
    let label = `${m.order}`;
    if (m.type === 'hotel') { bgColor = '#E67E22'; label = '🏨'; }
    else if (m.type === 'ticket') { bgColor = '#E74C3C'; label = '🎫'; }
    const content = `<div style="background:${bgColor};color:#fff;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:700">${label}</div>`;
    const marker = new AMap.Marker({
      position: [m.lng, m.lat],
      content: content,
      offset: new AMap.Pixel(-11, -11),
      title: m.type === 'hotel' ? `🏨 ${m.name}` : m.type === 'ticket' ? `🎫 ${m.name}` : `${m.order}. Day${m.day} ${m.name}`,
    });
    marker.setMap(overviewMap);

    marker.on('click', () => {
      const prefix = m.type === 'hotel' ? '🏨 ' : m.type === 'ticket' ? '🎫 需预约 ' : '';
      const info = new AMap.InfoWindow({
        content: `<div style="padding:4px 8px;font-size:13px"><b>${prefix}${m.name}</b>${m.day ? '<br>Day'+m.day : ''}</div>`,
        offset: new AMap.Pixel(0, -30),
      });
      info.open(overviewMap, [m.lng, m.lat]);
    });

// 收藏/取消收藏行程
function toggleFavorite() {
  if (!tripData) return;
  const favKey = `saved_trip_${tripData.destination}_${tripData.days}`;
  const btn = document.getElementById('favBtn');
  const hint = btn ? btn.querySelector('.fav-hint') : null;
  if (btn.classList.contains('favorited')) {
    localStorage.removeItem(favKey);
    btn.classList.remove('favorited');
    btn.innerHTML = '☆<span class="fav-hint">已取消收藏</span>';
    setTimeout(() => { if (hint) hint.classList.remove('show'); }, 1500);
    hint && hint.classList.add('show');
  } else {
    // 保存完整行程数据
    const saved = {destination: tripData.destination, days: tripData.days, itinerary: tripData.itinerary,
      weather: tripData.weather, budget_breakdown: tripData.budget_breakdown,
      booking_info: tripData.booking_info, tips: tripData.tips, saved_at: new Date().toISOString()};
    localStorage.setItem(favKey, JSON.stringify(saved));
    btn.classList.add('favorited');
    btn.innerHTML = '⭐<span class="fav-hint">已收藏</span>';
    hint && hint.classList.add('show');
    setTimeout(() => { if (hint) hint.classList.remove('show'); }, 1500);
  }
}

// 刷新收藏行程的天气和价格
async function refreshSavedTrip(city) {
  try {
    const res = await fetch(API + `/api/saved-trips/refresh?city=${encodeURIComponent(city)}&days=1`);
    const data = await res.json();
    if (data.success) {
      // 更新localStorage中的天气数据
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith('saved_trip_') && key.includes(city)) {
          try {
            const saved = JSON.parse(localStorage.getItem(key));
            saved.weather = data.weather;
            saved.updated_at = data.updated_at;
            localStorage.setItem(key, JSON.stringify(saved));
          } catch(e) {}
        }
      });
    }
  } catch(e) {}
}

// 加载已收藏的行程列表（首页显示）
function loadSavedTrips() {
  const savedTrips = [];
  Object.keys(localStorage).forEach(key => {
    if (key.startsWith('saved_trip_')) {
      try {
        const data = JSON.parse(localStorage.getItem(key));
        if (data && data.destination) savedTrips.push(data);
      } catch(e) {}
    }
  });
  return savedTrips.sort((a,b) => new Date(b.saved_at) - new Date(a.saved_at));
}

function openAmapLink(name, location){
  if(!location) return;
  const [lng, lat] = location.split(',');
  const uri = `https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeURIComponent(name)}&coordinate=gaode&callnative=1`;
  window.open(uri, '_blank');
}

// 天气渐变卡片配色方案（100%可靠，不依赖任何外部API）
function getWeatherGradient(desc) {
  var d = (desc||'晴').replace(/\s/g,'');
  // 精确匹配
  var gradMap = {
    '晴':'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
    '少云':'linear-gradient(135deg, #89CFF0 0%, #4facfe 100%)',
    '晴间多云':'linear-gradient(135deg, #74b9ff 0%, #a8e6cf 100%)',
    '多云':'linear-gradient(135deg, #bdc3c7 0%, #dfe6e9 100%)',
    '阴':'linear-gradient(135deg, #636e72 0%, #b2bec3 100%)',
    '阴天':'linear-gradient(135deg, #636e72 0%, #95a5a6 100%)',
    '阵雨':'linear-gradient(135deg, #5f9ea0 0%, #4682b4 100%)',
    '雷阵雨':'linear-gradient(135deg, #2c3e50 0%, #4a69bd 100%)',
    '雷阵雨伴有冰雹':'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)',
    '小雨':'linear-gradient(135deg, #a8c0ff 0%, #6c8cd9 100%)',
    '中雨':'linear-gradient(135deg, #6c8cd9 0%, #3b5998 100%)',
    '大雨':'linear-gradient(135deg, #3b5998 0%, #1a237e 100%)',
    '暴雨':'linear-gradient(135deg, #1a237e 0%, #0d1b2a 100%)',
    '大暴雨':'linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%)',
    '特大暴雨':'linear-gradient(135deg, #0d1b2a 0%, #000000 100%)',
    '冻雨':'linear-gradient(135deg, #8ecae6 0%, #219ebc 100%)',
    '雨':'linear-gradient(135deg, #5f9ea0 0%, #3b5998 100%)',
    '雨夹雪':'linear-gradient(135deg, #a8c0ff 0%, #e0e0e0 100%)',
    '小雪':'linear-gradient(135deg, #e0e0e0 0%, #b0c4de 100%)',
    '中雪':'linear-gradient(135deg, #c8d6e5 0%, #8395a7 100%)',
    '大雪':'linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%)',
    '暴雪':'linear-gradient(135deg, #b2bec3 0%, #636e72 100%)',
    '雪':'linear-gradient(135deg, #e8f4f8 0%, #c8d6e5 100%)',
    '雾':'linear-gradient(135deg, #d4d4d4 0%, #a8a8a8 100%)',
    '霾':'linear-gradient(135deg, #c9a66b 0%, #8b7355 100%)',
    '浮尘':'linear-gradient(135deg, #d4c5a9 0%, #a3957c 100%)',
    '扬沙':'linear-gradient(135deg, #c9a66b 0%, #8b6914 100%)',
    '沙尘暴':'linear-gradient(135deg, #b8860b 0%, #8b4513 100%)',
    '强沙尘暴':'linear-gradient(135deg, #8b4513 0%, #4a2000 100%)',
    '大风':'linear-gradient(135deg, #7f8c8d 0%, #95a5a6 100%)',
    '台风':'linear-gradient(135deg, #2c3e50 0%, #0d1b2a 100%)',
    '热带风暴':'linear-gradient(135deg, #34495e 0%, #1a252f 100%)',
    '风':'linear-gradient(135deg, #95a5a6 0%, #bdc3c7 100%)',
    '热':'linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%)',
    '冷':'linear-gradient(135deg, #a8d8ea 0%, #2193b0 100%)'
  };
  if (gradMap[d]) return gradMap[d];
  // 处理"X转Y"组合
  if (d.indexOf('转')>=0) {
    var parts = d.split('转');
    for (var i=0;i<parts.length;i++) {
      if (gradMap[parts[i]]) return gradMap[parts[i]];
    }
  }
  // 模糊匹配
  for (var k in gradMap) {
    if (d.indexOf(k)>=0 || k.indexOf(d)>=0) return gradMap[k];
  }
  return 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
}

function getWeatherIcon(desc) {
  var d = (desc||'晴').replace(/\s/g,'');

    '小雨':'🌧️','中雨':'🌧️','大雨':'🌧️','暴雨':'⛈️','大暴雨':'⛈️','特大暴雨':'⛈️',
    '冻雨':'🌨️','雨':'🌧️','雨夹雪':'🌨️',

  };
  if (iconMap[d]) return iconMap[d];

    var parts = d.split('转');

}

function renderSlot(title, cls, slot, dayIdx, slotIdx){
  if(!slot) return '';
  const slotStartTimes = {morning: '9:00', afternoon: '13:00', evening: '18:00'};
  let timeRange = '';
  if (slot.duration) {
    const durMatch = slot.duration.match(/(\d+(?:\.\d+)?)\s*小时/);
    if (durMatch) {
      const hours = parseFloat(durMatch[1]);
      const startTime = slotStartTimes[cls] || '9:00';
      const [sh, sm] = startTime.split(':').map(Number);
      const totalMin = sh * 60 + sm + Math.round(hours * 60);
      let eh = Math.floor(totalMin / 60);
      const em = totalMin % 60;
      // 跨天处理：超过23:59显示"次日XX:XX"
      if (eh >= 24) {
        let nextDayHour = eh % 24;
        timeRange = `${startTime} - 次日${String(nextDayHour).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
      } else {
        timeRange = `${startTime} - ${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
      }
    }
  }
  const spotName = slot.spot||'';
  const imgUrl = slot.image || '';
  const escName = spotName.replace(/'/g,"\\'");
  const escImgUrl = imgUrl.replace(/'/g,"\\'");
  const escReason = (slot.reason||'').replace(/'/g,"\\'");
  const escRouteDetail = (slot.route_detail||'').replace(/'/g,"\\'");
  const clickHandler = imgUrl
    ? `onclick="showSpotDetail('${escName}','${escImgUrl}','${escReason}','${slot.location||''}','${slot.duration||''}',${slot.need_booking||false},'${escRouteDetail}','${timeRange}',${dayIdx},${slotIdx})"`
    : `onclick="showSpotDetail('${escName}','','${escReason}','${slot.location||''}','${slot.duration||''}',${slot.need_booking||false},'${escRouteDetail}','${timeRange}',${dayIdx},${slotIdx})"`;
  const imgHtml = imgUrl
    ? `<img class="spot-img" src="${imgUrl}" alt="${escName}" onerror="imgFallback(this,'spot','${escName}',this.onclick)" ${clickHandler}>`
    : `<div class="spot-placeholder" ${clickHandler}><div class="ph-spot-name">${escName}</div><div class="ph-hint">暂无真实照片</div></div>`;
  // 推荐游览路线（在图片下方展示）
  const routes = slot.recommended_routes;
  let routesHtml = '';
  if (routes && Array.isArray(routes) && routes.length > 0) {
    const rid = 'rr_' + dayIdx + '_' + slotIdx;
    routesHtml = `<div class="recommend-routes">
      <div class="recommend-routes-header" onclick="var b=document.getElementById('${rid}');var a=this.querySelector('.rr-arrow');b.classList.toggle('show');a.classList.toggle('open')">
        <span>🗺️</span><span>推荐游览路线</span><span class="rr-arrow">▶</span>
      </div>
      <div class="recommend-routes-body" id="${rid}">`;
    routes.forEach((r, ri) => {
      routesHtml += `<div class="recommend-routes-item"><span class="rr-num">${ri+1}</span><span class="rr-text">${r}</span></div>`;
    });
    routesHtml += '</div></div>';
  }
  return `<div class="time-slot">
    <div class="slot-header"><div class="slot-dot ${cls}"></div><span class="slot-title">${title}</span>${slot.location ? `<span class="map-pin" onclick="openAmapLink('${escName}','${slot.location}')">📍</span>` : ''}</div>
    ${imgHtml}
    ${routesHtml}
    <div class="spot-name">${spotName}</div>
    ${timeRange ? `<div class="spot-time-range"><span class="sr-icon">🕐</span>${timeRange}</div>` : `<span class="meta-tag">时长：${slot.duration||''}</span>`}
    ${slot.need_booking ? '<span class="meta-tag booking">⚠需预约</span>' : ''}
    ${slot.location ? `<div class="spot-coord"><span class="coord-icon">📌</span>坐标：${slot.location}</div>` : ''}
    ${slot.route_detail ? `<div class="route-detail"><span class="route-icon">🗺️</span>游玩路线：${slot.route_detail}</div>` : ''}
    <div class="spot-reason">推荐理由：${slot.reason||''}</div>
  </div>`;
}

function openDayAmap(dayIdx){
  if(!tripData || !tripData.itinerary) return;
  const day = tripData.itinerary[dayIdx];
  if(!day) return;
  const spots = [];
  ['morning','afternoon','evening'].forEach(slot => {
    const s = day[slot];
    if(s && s.spot && s.location){
      const [lng, lat] = s.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) spots.push({ name: s.spot, location: s.location, lng, lat });
    }
  });
  if(spots.length === 0) { alert('该天暂无景点坐标'); return; }

  document.getElementById('mapDialogTitle').textContent = (day.date||'Day'+day.day)+' 景点路线';
  document.getElementById('mapOverlay').classList.add('show');

  // 初始化弹窗地图
  setTimeout(() => {
    if (typeof AMap === 'undefined') { console.warn('高德地图 SDK 未加载'); return; }
    const container = document.getElementById('dayMapContainer');
    if (!container) return;
    if (dayMap) { dayMap.destroy(); dayMap = null; }

    const centerLng = spots.reduce((s,m) => s + m.lng, 0) / spots.length;
    const centerLat = spots.reduce((s,m) => s + m.lat, 0) / spots.length;

    dayMap = new AMap.Map('dayMapContainer', {
      center: [centerLng, centerLat],
      zoom: spots.length > 1 ? 12 : 14,
      resizeEnable: true,
    });

    spots.forEach((s, i) => {
      const content = `<div style="background:#4A90D9;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:700">${i+1}</div>`;
      const marker = new AMap.Marker({
        position: [s.lng, s.lat],
        content: content,
        offset: new AMap.Pixel(-12, -12),
        title: s.name,
      });
      marker.setMap(dayMap);
      marker.on('click', () => {
        const info = new AMap.InfoWindow({
          content: `<div style="padding:4px 8px;font-size:13px"><b>${i+1}. ${s.name}</b></div>`,
          offset: new AMap.Pixel(0, -32),
        });
        info.open(dayMap, [s.lng, s.lat]);
      });
    });

    if (spots.length > 1) dayMap.setFitView(null, false, [40, 40, 40, 40]);
  }, 200);

  // 构建景点列表
  let html = '';
  spots.forEach((s, i) => {
    html += `<div class="map-spot-item"><span class="map-spot-num">${i+1}</span><div class="map-spot-info"><span class="map-spot-name">${s.name}</span><span class="map-spot-loc">坐标：${s.location}</span></div></div>`;
  });
  document.getElementById('daySpotList').innerHTML = html;
}
// 酒店地图：显示酒店位置和附近所有景点，方便用户根据景点远近选择酒店

        offset: new AMap.Pixel(0, -36),
      }).open(dayMap, [hLng, hLat]);
    });

    // 景点标记（蓝色编号）
    spots.forEach((s, i) => {
      const content = '<div style="background:#4A90D9;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:700">'+(i+1)+'</div>';

  spots.forEach((s, i) => {

function shareTrip(){
  if(!tripData) return;
  const canvas = document.createElement('canvas');
  canvas.width = 375; canvas.height = 500;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#4A90D9'; ctx.fillRect(0,0,375,80);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`行旅白 · ${tripData.destination}${tripData.days}日游`, 187, 50);
  ctx.fillStyle = '#333'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left';
  let y = 110;
  (tripData.itinerary||[]).forEach(day => {
    if(y>440) return;
    ctx.fillText(`Day${day.day} | ${day.morning?.spot||''} → ${day.afternoon?.spot||''}`, 20, y);
    y += 24;
  });
  ctx.fillStyle = '#666'; ctx.font = '12px sans-serif';
  (tripData.tips||[]).forEach(t => { if(y>480) return; ctx.fillText(`• ${t}`, 20, y); y+=20; });
  const link = canvas.toDataURL('image/png');
  const a = document.createElement('a'); a.href = link; a.download = `行旅白_${tripData.destination}${tripData.days}日游.png`;
  a.click();
  alert('分享卡片已下载！');
}

// 景点详情卡片（AI生成文本介绍 + 直接使用槽位已有图片）

async function showSpotDetail(name, image, reason, location, duration, need_booking, route_detail, timeRange, dayIdx, slotIdx) {
  const card = document.getElementById('detailCard');
  const overlay = document.getElementById('detailOverlay');
  const dest = tripData ? tripData.destination : '';
  const cacheKey = `spot_detail_${name}_${dest}`;
  // 显示加载动画
  card.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px"><div class="ai-loading"><span></span><span></span><span></span></div><div style="font-size:16px;color:#4A90D9;font-weight:500">AI正在生成详细介绍</div><div style="font-size:13px;color:#999">正在生成${name}介绍…</div></div>`;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
  // 直接使用槽位已有图片，不走额外API请求
  const finalImage = image || '';
  // 获取文本介绍（带缓存）
  const cached = localStorage.getItem(cacheKey);
  let content = '', fromCache = false;
  if (cached) {
    try { const parsed = JSON.parse(cached); if (parsed.content) { content = parsed.content; fromCache = true; } } catch(e) {}
  }
  if (!fromCache) {
    try {
      const params = new URLSearchParams({name, city: dest, reason, route_detail});
      const res = await fetch(`${API}/api/spot-detail?${params}`);
      const data = await res.json();
      content = data.content || reason;
      localStorage.setItem(cacheKey, JSON.stringify({content, time: Date.now()}));
    } catch(e) { content = reason || `${name}是${dest}的著名景点。`; }
  }
  // 路线规划
  let routeInfo = '';
  let recommendedRoutes = [];
  if (dayIdx !== undefined && slotIdx !== undefined && tripData && tripData.itinerary) {
    const day = tripData.itinerary[dayIdx];
    if (day) {
      const slots = ['morning', 'afternoon', 'evening'];
      const slot = day[slots[slotIdx]];
      if (slot && slot.recommended_routes) {
        recommendedRoutes = slot.recommended_routes;
      }
      let prevSpot = null;
      for (let i = slotIdx - 1; i >= 0; i--) {
        const s = day[slots[i]];
        if (s && s.spot && s.location) { prevSpot = s; break; }
      }
      if (prevSpot && location) {
        const [plng, plat] = prevSpot.location.split(',').map(Number);
        const [clng, clat] = location.split(',').map(Number);
        if (!isNaN(plng) && !isNaN(plat) && !isNaN(clng) && !isNaN(clat)) {
          try {
            const res = await fetch(API + '/api/route-plan', {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({spots: [{name: prevSpot.spot, lng: plng, lat: plat}, {name, lng: clng, lat: clat}]})
            });
            const data = await res.json();
            if (data.success && data.routes && data.routes[0] && data.routes[0].duration) {
              const r = data.routes[0];
              const trafficMap = {'畅通':'green','缓行':'orange','拥堵':'red'};
              routeInfo = `<div class="route-info"><span class="ri-icon">🚗</span>从「${prevSpot.spot}」出发：${r.distance}，约${r.duration}分钟 <span class="ri-traffic ${trafficMap[r.traffic]||'green'}">${r.traffic}</span></div>`;
            }
          } catch(e) {}
        }
      }
    }
  }
  renderDetailCard(card, 'spot', {name, image: finalImage, duration, need_booking, route_detail, timeRange, location, content, cacheKey, fromCache, dest, reason, routeInfo,
    recommended_routes: recommendedRoutes});
  document.body.style.overflow = '';
}

// 统一渲染详情卡片
function renderDetailCard(card, type, opts) {
  const {name, image, duration, need_booking, route_detail, timeRange, location, content, cacheKey, fromCache, area, price, stay_days, routeInfo, recommended_routes} = opts;
  let html = '';
  // 确保图片src永不为空，天气用text_to_image兜底，景点/酒店用占位提示
  const imgSrc = image || (type === 'weather' ? getFallbackImgUrl(name, 'weather') : '');
  const escapedName = name.replace(/'/g, "\\'");
  if (imgSrc) {
    html += `<img class="detail-img" src="${imgSrc}" alt="${name}" onerror="imgFallback(this,'${type}','${escapedName}')">`;
  } else {
    html += `<div class="detail-placeholder"><div class="ph-detail-name">${name}</div><div class="ph-detail-hint">暂无真实照片</div></div>`;
  }
  html += `<div class="detail-body">
    <div class="detail-title">${type==='hotel'?'🏨 ':''}${name}</div>
    <div class="detail-meta">`;
  if (type === 'spot') {
    if (timeRange) html += `<span class="detail-meta-tag">🕐 ${timeRange}</span>`;
    else if (duration) html += `<span class="detail-meta-tag">⏱ ${duration}</span>`;
    if (need_booking) html += '<span class="detail-meta-tag warn">⚠ 需提前预约</span>';
  } else {
    if (area) html += `<span class="detail-meta-tag">📍 ${area}</span>`;
    if (price) html += `<span class="detail-meta-tag" style="color:#E67E22">💰 ${price}</span>`;
    if (stay_days) html += `<span class="detail-meta-tag">📅 ${stay_days}</span>`;
  }
  html += `</div>`;
  if (routeInfo) html += routeInfo;
  if (route_detail) html += `<div class="detail-section"><div class="detail-section-title">🗺️ 游玩路线</div><div class="detail-section-text">${route_detail}</div></div>`;
  if (recommended_routes && Array.isArray(recommended_routes) && recommended_routes.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title">🗺️ 推荐游览路线</div>`;
    recommended_routes.forEach((r, i) => {
      html += `<div class="detail-route-item"><span class="rr-num-detail">${i+1}</span>${r}</div>`;
    });
    html += `</div>`;
  }
  html += `<div class="detail-section" style="margin-top:12px"><div class="detail-section-title">📖 详细介绍${fromCache?' <span style="font-size:12px;color:#52C41A">(已缓存)</span>':''}</div><div class="detail-long-text">${content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div></div>`;
  if (location) html += `<div class="detail-section"><div class="detail-section-title">📍 坐标位置</div><div class="detail-section-text">${location}</div></div>`;
  html += `<button class="btn-regenerate" onclick="regenerateDetail('${cacheKey}','${type}','${name.replace(/'/g,"\\'")}')">🔄 重新生成介绍</button>`;
  html += `<button class="detail-close" onclick="closeDetail()">关闭</button></div>`;
  card.innerHTML = html;
}

// 重新生成详情介绍（同时刷新图片）
async function regenerateDetail(cacheKey, type, name) {
  const card = document.getElementById('detailCard');
  localStorage.removeItem(cacheKey);
  const btn = card.querySelector('.btn-regenerate');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 重新生成中...'; }
  const dest = tripData ? tripData.destination : '';
  const endpoint = type === 'spot' ? '/api/spot-detail' : '/api/hotel-detail';
  try {
    // 并行：刷新文本 + 刷新图片
    const params = new URLSearchParams({name, city: dest});
    const [textRes, imgRes] = await Promise.all([
      fetch(`${API}${endpoint}?${params}`),
      fetch(`${API}/api/spot-images?query=${encodeURIComponent(name + ' ' + dest)}&limit=1`)
    ]);
    const textData = await textRes.json();
    const content = textData.content || '';
    localStorage.setItem(cacheKey, JSON.stringify({content, time: Date.now()}));
    // 更新卡片内容
    const textDiv = card.querySelector('.detail-long-text');
    if (textDiv) textDiv.innerHTML = '<p>' + content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
    const titleDiv = card.querySelector('.detail-section-title');
    if (titleDiv && titleDiv.textContent.includes('详细介绍')) titleDiv.textContent = '📖 详细介绍 (已更新)';
    // 刷新图片
    try {
      const imgData = await imgRes.json();
      const imgEl = card.querySelector('.detail-img');
