<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行旅白 AI 旅行规划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;min-height:100vh;color:#333}
.container{max-width:420px;margin:0 auto;padding:40px 24px 32px}
.header{text-align:center;margin-bottom:40px}
.header-top{display:flex;align-items:center;justify-content:center;gap:12px}
.logo{font-size:48px;font-weight:900;color:#4A90D9;letter-spacing:6px}
.city-badge{display:inline-flex;align-items:center;gap:4px;background:#EEF4FB;color:#4A90D9;padding:8px 16px;border-radius:20px;font-size:16px;cursor:pointer;border:1px solid #d0e4f7;margin-top:10px}
.city-badge .city-icon{font-size:18px;pointer-events:none}
.city-badge .city-name{font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.city-badge .city-edit{font-size:12px;opacity:.6;pointer-events:none}
.title{font-size:28px;color:#333;font-weight:500;margin-top:8px}
.subtitle{font-size:18px;color:#999;margin-top:10px}
.form-card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 4px 24px rgba(74,144,217,0.08);border:1px solid #eef4fb}
.form-item{margin-bottom:24px}
.label{font-size:20px;color:#333;font-weight:500;margin-bottom:12px;display:block}
.input{width:100%;border:1px solid #e8e8e8;border-radius:12px;padding:16px 18px;font-size:20px;background:#f9fafb;color:#333;outline:none;transition:border-color .2s}
.input:focus{border-color:#4A90D9}
.date-row{display:flex;align-items:center;gap:10px}
.date-picker{flex:1;min-width:0;border:1px solid #e8e8e8;border-radius:12px;padding:14px 10px;font-size:16px;background:#f9fafb;color:#333;cursor:pointer;text-align:center}
.date-picker.placeholder{color:#999}
.date-arrow{font-size:24px;color:#4A90D9;font-weight:600;flex-shrink:0}
.days-hint{text-align:right;margin-top:8px;font-size:16px;color:#666}
.days-num{color:#4A90D9;font-size:24px;font-weight:700}
.tag-group{display:flex;flex-wrap:wrap;gap:12px}
.tag{padding:10px 22px;border-radius:24px;font-size:18px;color:#666;background:#f5f5f5;cursor:pointer;transition:all .2s;border:none;user-select:none}
.tag.active{color:#fff;background:#4A90D9}
/* 预算类型切换 */
.budget-type-row{display:flex;gap:0;margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid #e8e8e8}
.budget-type-btn{flex:1;padding:12px 0;text-align:center;font-size:16px;cursor:pointer;background:#f9fafb;color:#666;border:none;transition:all .2s}
.budget-type-btn.active{background:#4A90D9;color:#fff;font-weight:600}
/* 人数输入 */
.people-row{display:flex;align-items:center;gap:8px}
.people-input{width:80px;text-align:center;border:1px solid #e8e8e8;border-radius:12px;padding:14px 8px;font-size:20px;background:#f9fafb;color:#333;outline:none}
.people-input:focus{border-color:#4A90D9}
.people-btn{width:40px;height:40px;border-radius:50%;border:1px solid #e8e8e8;background:#f9fafb;font-size:22px;color:#4A90D9;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
.people-btn:hover{background:#EEF4FB}
.people-hint{font-size:14px;color:#999;margin-left:8px}
/* 节奏滑块 */
.pace-slider-wrap{position:relative;padding:0 4px}
.pace-slider{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:linear-gradient(to right,#7BC67E,#F5A623,#E74C3C);outline:none;cursor:pointer}
.pace-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid #4A90D9;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.pace-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:14px;color:#999}
.pace-label.active{color:#4A90D9;font-weight:600}
.pace-val{text-align:center;font-size:16px;color:#4A90D9;font-weight:600;margin-top:4px}
.btn-generate{width:100%;height:72px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border-radius:40px;font-size:24px;font-weight:600;margin-top:16px;border:none;cursor:pointer;transition:opacity .2s}
.btn-generate:disabled{opacity:.7;cursor:not-allowed}
.btn-content{display:flex;align-items:center;justify-content:center;height:100%}
.btn-content.loading{gap:8px}
.loading-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
.loading-text{color:#fff;font-size:18px;margin-left:8px;transition:opacity .3s}
@keyframes bounce{to{transform:translateY(-6px);opacity:.5}}

/* 总览地图页 */
.overview-container{max-width:420px;margin:0 auto;display:none;flex-direction:column;height:100vh}
.overview-header{text-align:center;padding:16px;background:#4A90D9;color:#fff}
.overview-header h2{font-size:22px;font-weight:500}
.day-list{flex:0 0 42%;background:#fff;overflow-y:auto;padding:0 20px}
.day-summary{border-bottom:1px solid #f0f0f0}
.day-summary-header{display:flex;align-items:center;padding:14px 0;cursor:pointer}
.day-label{background:#4A90D9;color:#fff;font-size:14px;font-weight:600;padding:3px 10px;border-radius:12px;margin-right:10px}
.day-summary-date{font-size:16px;color:#999;flex:1}
.day-arrow{font-size:12px;color:#999}
.day-spots{display:none;padding:0 0 14px 12px}
.day-spots.show{display:block}
.day-spot{display:flex;align-items:center;padding:6px 0}
.spot-num{width:28px;height:28px;border-radius:50%;background:#EEF4FB;color:#4A90D9;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.spot-info{flex:1}
.spot-name{font-size:18px;color:#333;font-weight:500;display:block}
.spot-time{font-size:14px;color:#999}
.spot-loc-icon{font-size:20px;cursor:pointer;padding:2px}
.map-panel{flex:1;position:relative;background:#f5f6f8;min-height:0}
#overviewMapContainer{width:100%;height:100%}
.map-legend-overview{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:6px 16px;border-radius:16px;font-size:14px;z-index:10;pointer-events:none}
.overview-bottom{background:#fff;padding:16px 30px 28px}
.spot-summary{text-align:center;margin-bottom:8px;font-size:16px;color:#666}
.btn-detail{width:100%;height:52px;background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;border-radius:28px;font-size:20px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
.btn-overview-back{width:100%;height:52px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:28px;font-size:20px;cursor:pointer}

/* 行程页 */
.trip-container{max-width:420px;margin:0 auto;padding:16px 24px 32px;background:#f5f6f8;min-height:100vh;display:none}
.trip-header{text-align:center;padding:20px 0;margin-bottom:16px}
.trip-header h2{font-size:24px;color:#4A90D9}
.weather-bar{background:#fff;border-radius:12px;padding:16px 0;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04);display:flex;overflow-x:auto}
.weather-item{display:flex;flex-direction:column;align-items:center;padding:0 20px;min-width:100px;flex-shrink:0}
.w-icon{font-size:28px}.w-date{font-size:16px;color:#999;margin-top:4px}.w-desc{font-size:18px;color:#333;font-weight:500}.w-temp{font-size:16px;color:#4A90D9}
.day-card{background:#fff;border-radius:12px;padding:0 0 20px 0;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.04);overflow:hidden}
.card-header{padding:20px 20px 0 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.day-badge{background:#4A90D9;color:#fff;font-size:18px;font-weight:600;padding:4px 14px;border-radius:16px}
.day-date{font-size:18px;color:#999}
.day-weather{font-size:18px;color:#666;margin-left:auto}
.map-btn{display:flex;align-items:center;gap:4px;padding:6px 14px;background:#EEF4FB;border-radius:16px;cursor:pointer;border:none;font-size:15px;color:#4A90D9;font-weight:500}
.weather-img{width:100%;height:150px;object-fit:cover;margin-top:12px}
.time-slot{padding:16px 20px 0 20px}
.slot-header{display:flex;align-items:center;margin-bottom:10px}
.slot-dot{width:8px;height:8px;border-radius:50%;margin-right:8px}
.slot-dot.morning{background:#F5A623}.slot-dot.afternoon{background:#4A90D9}.slot-dot.evening{background:#7B68EE}
.slot-title{font-size:22px;font-weight:600;color:#333;flex:1}
.map-pin{font-size:18px;cursor:pointer;padding:4px;opacity:.7;transition:opacity .2s}
.map-pin:hover{opacity:1}
.spot-img{width:100%;height:200px;border-radius:12px;object-fit:cover;margin-bottom:10px}
.spot-name{font-size:24px;font-weight:600;color:#222;margin-bottom:6px}
.meta-tag{font-size:16px;color:#4A90D9;background:#EEF4FB;padding:3px 12px;border-radius:8px;display:inline-block;margin-right:6px}
.meta-tag.booking{color:#E67E22;background:#FFF3E0}
.spot-coord{display:flex;align-items:center;margin-top:6px;font-size:14px;color:#999}
.spot-coord .coord-icon{margin-right:4px}
.spot-reason{font-size:18px;color:#888;line-height:1.5;padding-bottom:4px;border-bottom:1px solid #f0f0f0;margin-top:6px}
.day-footer{padding:12px 20px 0 20px}
.footer-row{display:flex;align-items:center;padding:6px 0;font-size:18px}
.footer-icon{font-size:20px;margin-right:8px}
.footer-label{color:#666;font-weight:500;min-width:60px}
.footer-text{color:#333}
.bottom-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.bottom-title{font-size:24px;font-weight:600;color:#333;margin-bottom:14px;padding-left:12px;border-left:4px solid #4A90D9}
.budget-grid{display:flex;flex-wrap:wrap;gap:12px}
.budget-item{flex:1;min-width:28%;text-align:center;background:#f9fafb;border-radius:12px;padding:14px 8px}
.budget-name{font-size:18px;color:#999;display:block}.budget-value{font-size:22px;color:#4A90D9;font-weight:600;display:block;margin-top:4px}
/* 订票/酒店/门票 */
.booking-item{padding:12px 0;border-bottom:1px solid #f5f5f5}
.booking-item:last-child{border-bottom:none}
.booking-row{display:flex;align-items:center;padding:3px 0}
.booking-type{background:#4A90D9;color:#fff;font-size:14px;padding:2px 8px;border-radius:6px;margin-right:8px}
.booking-suggest{font-size:18px;color:#333;font-weight:500;flex:1}
.booking-hotel-name{font-size:20px;color:#333;font-weight:600}
.booking-area{font-size:16px;color:#999;flex:1}
.booking-price{font-size:18px;color:#E67E22;font-weight:600}
.booking-note{font-size:16px;color:#999;flex:1}
.booking-reason{font-size:16px;color:#666;padding:3px 0}
.ticket-item{background:#FFF8F0;margin:0 -20px;padding:12px 20px;border-radius:0}
.ticket-spot{font-size:18px;color:#333;font-weight:600;flex:1}
.ticket-price{font-size:18px;color:#E67E22}
.ticket-booking-warn{font-size:16px;color:#E74C3C;font-weight:500}
.ticket-platform{font-size:16px;color:#666}
.ticket-note{font-size:16px;color:#999;padding:3px 0}
.btn-book{width:100%;height:42px;background:#4A90D9;color:#fff;border-radius:21px;font-size:18px;margin-top:8px;border:none;cursor:pointer}
.btn-book.warn{background:#E67E22}
.btn-book-row{display:flex;gap:8px;margin-top:8px}
.btn-book-row .btn-book{flex:1;margin-top:0}
.btn-book-row .btn-map{flex:1;height:42px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:21px;font-size:18px;cursor:pointer}
.map-spot-num.hotel{background:#E74C3C}
.tip-item{display:flex;padding:8px 0;font-size:20px}
.tip-dot{color:#4A90D9;margin-right:10px;line-height:1.5}
.tip-text{color:#555;line-height:1.5}
.btn-share{width:100%;height:66px;background:#4A90D9;color:#fff;border-radius:40px;font-size:22px;cursor:pointer;margin-bottom:12px;border:none}
.btn-back{width:100%;height:66px;background:#fff;color:#4A90D9;border:1px solid #4A90D9;border-radius:40px;font-size:22px;cursor:pointer;margin-top:4px}

/* 地图弹窗 */
.map-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.map-overlay.show{display:flex}
.map-dialog{background:#fff;border-radius:16px;width:90%;max-width:400px;max-height:80vh;overflow:hidden}
.map-dialog-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.map-dialog-title{font-size:20px;font-weight:600;color:#333}
.map-close{font-size:24px;color:#999;cursor:pointer;border:none;background:none;padding:4px}
.map-dialog-body{padding:0;position:relative}
#dayMapContainer{width:100%;height:300px}
.map-spot-list{padding:12px 20px;max-height:200px;overflow-y:auto}
.map-spot-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5}
.map-spot-num{width:28px;height:28px;border-radius:50%;background:#4A90D9;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}
.map-spot-info{flex:1}
.map-spot-name{font-size:18px;font-weight:500;color:#333}
.map-spot-loc{font-size:14px;color:#999;margin-top:2px}
.map-spot-loc a{color:#4A90D9;text-decoration:none}
.map-spot-loc a:hover{text-decoration:underline}

/* 城市编辑弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:9999}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;padding:30px;border-radius:12px;width:80%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center;color:#333}
.modal-input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:20px;outline:none;box-sizing:border-box}
.modal-input:focus{border-color:#4A90D9}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.modal-btn.ok{background:#4A90D9;color:#fff}
.modal-btn.cancel{background:#f5f5f5;color:#333}

.history-section{margin-top:40px}
.history-header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #eee;cursor:pointer}
.history-title{font-size:20px;font-weight:600;color:#333}
.history-arrow{font-size:16px;color:#4A90D9}
.history-list{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease;opacity:0}
.history-list.show{max-height:800px;opacity:1;padding-top:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:16px 12px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.h-left{display:flex;align-items:center;gap:10px}
.h-dest{font-size:18px;color:#333;font-weight:500}
.h-days{font-size:14px;color:#4A90D9;background:#EEF4FB;padding:3px 10px;border-radius:8px}
.h-time{font-size:14px;color:#999}

/* 景点/酒店详情卡片弹窗 */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:10000}
.detail-overlay.show{display:flex}
.detail-card{background:#fff;border-radius:16px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.detail-img{width:100%;height:220px;object-fit:cover;border-radius:16px 16px 0 0}
.detail-body{padding:20px}
.detail-title{font-size:24px;font-weight:700;color:#222;margin-bottom:8px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.detail-meta-tag{font-size:14px;padding:4px 12px;border-radius:12px;background:#EEF4FB;color:#4A90D9}
.detail-meta-tag.warn{background:#FFF3E0;color:#E67E22}
.detail-desc{font-size:16px;color:#555;line-height:1.7;margin-bottom:14px}
.detail-section{margin-bottom:12px}
.detail-section-title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px}
.detail-section-text{font-size:15px;color:#666;line-height:1.5}
.detail-close{display:block;width:100%;padding:14px;background:#f5f5f5;border:none;font-size:16px;color:#333;cursor:pointer;border-radius:0 0 16px 16px;margin-top:4px}
.detail-close:hover{background:#eee}

/* 天气逐时卡片 */
.weather-hourly-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:10000}
.weather-hourly-overlay.show{display:flex}
.weather-hourly-card{background:#fff;border-radius:16px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.wh-header{background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;padding:20px;border-radius:16px 16px 0 0;text-align:center}
.wh-date{font-size:20px;font-weight:600;margin-bottom:4px}
.wh-summary{font-size:16px;opacity:.9}
.wh-current{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;background:#f9fafb;border-bottom:1px solid #eee}
.wh-current-temp{font-size:48px;font-weight:700;color:#4A90D9}
.wh-current-desc{font-size:18px;color:#666}
.wh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px}
.wh-item{text-align:center;padding:10px 4px;border-radius:10px;background:#f9fafb}
.wh-item.now{background:#EEF4FB;border:1px solid #4A90D9}
.wh-time{font-size:13px;color:#999;margin-bottom:4px}
.wh-emoji{font-size:22px;margin-bottom:2px}
.wh-temp{font-size:15px;color:#333;font-weight:600}
.wh-close{display:block;width:100%;padding:14px;background:#f5f5f5;border:none;font-size:16px;color:#333;cursor:pointer;border-radius:0 0 16px 16px}

/* 极端天气预警条 */
.alert-bar{position:fixed;top:0;left:0;right:0;background:#E74C3C;color:#fff;padding:12px 20px;font-size:15px;text-align:center;z-index:9999;display:none;animation:slideDown .3s ease}
.alert-bar.show{display:flex;align-items:center;justify-content:center;gap:8px}
.alert-bar.snow{background:#3498DB}
.alert-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;margin-left:8px}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* 酒店图片 */
.hotel-img{width:100%;height:160px;object-fit:cover;border-radius:10px;margin:8px 0;cursor:pointer}
.spot-img{cursor:pointer}
.weather-img{cursor:pointer}

/* route_detail 路线详情 */
.route-detail{font-size:15px;color:#4A90D9;background:#EEF4FB;padding:8px 12px;border-radius:8px;margin-top:6px;line-height:1.5}
.route-detail .route-icon{margin-right:4px}

/* 换酒店推荐卡片 */
.hotel-change-card{background:#FFF8F0;padding:16px;border-radius:12px;margin-bottom:12px;border:1px dashed #E67E22}
.hotel-change-title{font-size:18px;font-weight:600;color:#E67E22;margin-bottom:8px}
.hotel-change-row{font-size:15px;color:#666;padding:3px 0}
</style>
</head>
<body>

<!-- 首页 -->
<div class="container" id="homePage">
  <div class="header">
    <div class="logo">行旅白</div>
    <div class="title">AI 旅行规划</div>
    <div class="subtitle">输入你的需求，AI 为你规划完美行程</div>
    <div class="city-badge" id="cityBadge" onclick="editCity()">
      <span class="city-icon">📍</span>
      <span class="city-name" id="cityName">定位中...</span>
      <span class="city-edit">编辑</span>
    </div>
  </div>
  <div class="form-card">
    <div class="form-item">
      <label class="label">目的地</label>
      <input class="input" id="destination" placeholder="输入你想去的城市，如：杭州">
    </div>
    <div class="form-item">
      <label class="label">出行日期</label>
      <div class="date-row">
        <input type="date" class="date-picker" id="startDate" min="">
        <span class="date-arrow">→</span>
        <input type="date" class="date-picker" id="endDate" min="">
      </div>
      <div class="days-hint" id="daysHint" style="display:none">
        共 <span class="days-num" id="daysNum">0</span> 天行程
      </div>
    </div>
    <div class="form-item">
      <label class="label">预算</label>
      <div class="budget-type-row" id="budgetTypeRow">

        <button class="budget-type-btn" data-type="aa" onclick="switchBudgetType('aa')">AA制</button>

    <div class="form-item">

        <button class="people-btn" onclick="changePeople(1)">+</button>

    <div class="form-item">
      <label class="label">游玩节奏</label>
      <div class="pace-slider-wrap">
        <input type="range" class="pace-slider" id="paceSlider" min="0" max="2" value="1" step="1" oninput="updatePace()">
        <div class="pace-labels">
          <span class="pace-label" id="paceRelaxed">🏖️ 休闲</span>
          <span class="pace-label" id="paceModerate">🚶 适中</span>
          <span class="pace-label" id="paceFast">🏃 快速</span>

    </div>
    <div class="form-item">
      <label class="label">兴趣爱好（多选）</label>
      <div class="tag-group" id="tagGroup">
        <button class="tag" data-tag="美食">美食</button>
        <button class="tag" data-tag="人文">人文</button>
        <button class="tag" data-tag="户外">户外</button>
        <button class="tag" data-tag="亲子">亲子</button>
        <button class="tag" data-tag="摄影">摄影</button>
        <button class="tag" data-tag="购物">购物</button>
        <button class="tag" data-tag="自然">自然</button>
        <button class="tag" data-tag="网红">网红</button>
      </div>
    </div>
    <button class="btn-generate" id="btnGenerate">
      <div class="btn-content" id="btnNormal">一键生成攻略</div>
      <div class="btn-content loading" id="btnLoading" style="display:none">
        <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
        <span class="loading-text" id="progressText">AI 正在规划中...</span>
      </div>
    </button>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header" onclick="toggleHistory()">
      <span class="history-title">历史记录</span>
      <span class="history-arrow" id="historyArrow">展开</span>
    </div>
    <div class="history-list" id="historyList"></div>

</div>

<!-- 总览地图页 -->
<div class="overview-container" id="overviewPage">
  <div class="overview-header"><h2 id="overviewTitle">行程总览</h2></div>
  <div class="day-list" id="dayList"></div>

</div>

<!-- 行程详情页 -->
<div class="trip-container" id="tripPage">
  <div class="trip-header"><h2 id="tripTitle"></h2></div>

  <div id="budgetCard"></div>

    <div class="map-dialog-body">

<div class="alert-bar" id="alertBar">
  <span id="alertMsg"></span>
  <button class="alert-close" onclick="closeAlert()">×</button>

<script>
(function() {
const API = window.location.origin;
let selectedTags = [];
let tripData = null;
let departureCity = '';
let budgetType = 'total';  // 预算类型：total=总预算, aa=AA制

// 预算类型切换
function switchBudgetType(type) {
  budgetType = type;
  document.querySelectorAll('#budgetTypeRow .budget-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
}

// 旅行人数加减
function changePeople(delta) {
  const input = document.getElementById('travelers');
  let val = parseInt(input.value) || 1;
  val = Math.max(1, Math.min(50, val + delta));
  input.value = val;
  updatePeopleHint();
}
function updatePeopleHint() {
  const val = parseInt(document.getElementById('travelers').value) || 1;
  const hint = document.getElementById('peopleHint');
  if (val <= 1) hint.textContent = '1人出行';
  else if (val <= 2) hint.textContent = '情侣出游';
  else if (val <= 4) hint.textContent = '家庭/小团体';
  else if (val <= 8) hint.textContent = '中型团体';
  else hint.textContent = '大型团体';
}

// 游玩节奏滑块
function updatePace() {
  const v = parseInt(document.getElementById('paceSlider').value);
  const labels = ['relaxed', 'moderate', 'fast'];
  const names = ['休闲节奏', '适中节奏', '快速节奏'];
  document.getElementById('paceVal').textContent = names[v];
  document.querySelectorAll('.pace-label').forEach(l => l.classList.remove('active'));
  const labelMap = {0: 'paceRelaxed', 1: 'paceModerate', 2: 'paceFast'};
  document.getElementById(labelMap[v]).classList.add('active');
}

// 定位：优先GPS精确坐标→逆地理编码，失败则IP定位兜底
async function locateCity() {
  // 第一步：尝试浏览器GPS定位
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject,
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 300000 });
      });
      const res = await fetch(API + `/api/regeo?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`);
      const data = await res.json();
      if (data.success && data.city) {
        departureCity = data.city;
        document.getElementById('cityName').textContent = departureCity;
        return;
      }
    } catch(e) { /* GPS失败，回退到IP定位 */ }
  }
  // 第二步：IP定位兜底
  try {
    const res = await fetch(API + '/api/locate');
    const data = await res.json();
    if (data.success && data.city) {
      departureCity = data.city;
      document.getElementById('cityName').textContent = departureCity;
    } else {
      document.getElementById('cityName').textContent = '点击编辑';
    }
  } catch(e) {
    document.getElementById('cityName').textContent = '点击编辑';
  }
}
function editCity() {
  document.getElementById('cityModal').classList.add('show');
  document.getElementById('cityInput').value = departureCity || '';
  document.getElementById('cityInput').focus();
}
function confirmCity() {
  const val = document.getElementById('cityInput').value.trim();
  if (val) {
    departureCity = val;
    document.getElementById('cityName').textContent = departureCity;
  }
  document.getElementById('cityModal').classList.remove('show');
}
function cancelCity() {
  document.getElementById('cityModal').classList.remove('show');
}
locateCity();
// 用事件监听器绑定编辑按钮（兜底onclick可能被拦截）
document.getElementById('cityBadge').addEventListener('click', editCity);
let overviewMap = null;  // 总览页地图实例
let dayMap = null;       // 行程页弹窗地图实例
let allMarkers = [];     // 总览页所有标记点
const PROGRESS_TEXTS = [
  '正在查询目的地信息...',
  '正在获取景点数据...',
  '正在查询天气情况...',
  'AI 正在为你规划行程...',
  '正在查询机票酒店信息...',
  '正在生成美食推荐...',
  '即将完成，请稍候...',
];

function loadHistory() { try { return JSON.parse(localStorage.getItem('trip_history')||'[]'); } catch(e){ return []; } }
function saveToHistory(data) {
  let history = loadHistory();
  const idx = history.findIndex(h => h.destination===data.destination && h.days===data.days);
  const record = { id: Date.now(), destination: data.destination, days: data.days, budget: data.budget||'', time: new Date().toLocaleString(), data: data };
  if(idx>-1) history[idx]=record; else history.unshift(record);
  if(history.length>20) history.pop();
  localStorage.setItem('trip_history', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  const history = loadHistory();
  const sec = document.getElementById('historySection');
  if(history.length===0){ sec.style.display='none'; return; }
  sec.style.display='block';
  let html = '';
  history.forEach(h => {
    html += `<div class="history-item" onclick="loadHistoryTrip(${h.id})"><div class="h-left"><span class="h-dest">${h.destination}</span><span class="h-days">${h.days}日游</span></div><span class="h-time">${h.time}</span></div>`;
  });
  document.getElementById('historyList').innerHTML = html;
}
function toggleHistory() {
  const list = document.getElementById('historyList');
  const arrow = document.getElementById('historyArrow');
  if(list.classList.contains('show')){ list.classList.remove('show'); arrow.textContent='展开'; }
  else { list.classList.add('show'); arrow.textContent='收起'; }
}
function loadHistoryTrip(id) {
  const history = loadHistory();
  const record = history.find(h => h.id===id);
  if(record && record.data) { tripData = record.data; renderOverview(record.data); }
}

// 标签点击
document.querySelectorAll('#tagGroup .tag').forEach(btn => {
  btn.addEventListener('click', function(){
    const tag = this.dataset.tag;
    const idx = selectedTags.indexOf(tag);
    if(idx > -1){ selectedTags.splice(idx,1); this.classList.remove('active'); }
    else { selectedTags.push(tag); this.classList.add('active'); }
  });
});

// 日期选择器联动，限制从今天开始
const startEl = document.getElementById('startDate');
const endEl = document.getElementById('endDate');
// 获取今天日期（YYYY-MM-DD格式），设置min属性禁止选择过去日期
const today = new Date();
const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
startEl.setAttribute('min', todayStr);
endEl.setAttribute('min', todayStr);
// 开始日期变更时，结束日期同步min
startEl.addEventListener('change', function() {
  endEl.setAttribute('min', this.value);
  updateDays();
});
endEl.addEventListener('change', updateDays);
function updateDays() {
  const s = startEl.value, e = endEl.value;
  if (s && e) {
    const days = Math.max(1, Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1);
    document.getElementById('daysNum').textContent = days;
    document.getElementById('daysHint').style.display = 'block';
    return days;
  }
  document.getElementById('daysHint').style.display = 'none';
  return 0;
}

// 生成攻略
let progressTimer = null;
document.getElementById('btnGenerate').addEventListener('click', async function(){
  const dest = document.getElementById('destination').value.trim();
  const days = updateDays();
  if(!dest){ alert('请输入目的地'); return; }
  if(days < 1){ alert('请选择出行日期'); return; }
  document.getElementById('btnNormal').style.display='none';
  document.getElementById('btnLoading').style.display='flex';
  this.disabled = true;
  let idx = 0;
  const progEl = document.getElementById('progressText');
  progEl.textContent = PROGRESS_TEXTS[0];
  progressTimer = setInterval(() => { idx=(idx+1)%PROGRESS_TEXTS.length; progEl.textContent=PROGRESS_TEXTS[idx]; }, 2000);
  try {
    const res = await fetch(API+'/api/generate-trip',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        destination: dest, days: days,
        budget: document.getElementById('budget').value,
        budget_type: budgetType,
        interests: selectedTags,
        start_date: startEl.value, end_date: endEl.value,
        departure_city: departureCity,
        travelers: parseInt(document.getElementById('travelers').value) || 1,
        pace: ['relaxed','moderate','fast'][parseInt(document.getElementById('paceSlider').value)],
      })
    });
    clearInterval(progressTimer);
    const data = await res.json();
    if(data.success) { tripData = data.data; saveToHistory(data.data); renderOverview(data.data); }
    else { alert('攻略生成失败，请检查网络后重试\n'+(data.error||'')); }
  } catch(e){ clearInterval(progressTimer); alert('攻略生成失败，请检查网络后重试'); }
  finally {
    document.getElementById('btnNormal').style.display='flex';
    document.getElementById('btnLoading').style.display='none';
    this.disabled = false;
  }
});

// 总览页
function renderOverview(data){
  tripData = data;
  document.getElementById('homePage').style.display='none';
  document.getElementById('tripPage').style.display='none';
  document.getElementById('overviewPage').style.display='flex';

  // 销毁旧地图
  if (dayMap) { dayMap.destroy(); dayMap = null; }

  document.getElementById('overviewTitle').textContent = data.destination + data.days + '日游行程总览';

  // 按天构建列表 + 收集所有景点坐标
  let allSpots = 0;
  let listHtml = '';
  allMarkers = [];
  let globalOrder = 1;

  (data.itinerary||[]).forEach((day, idx) => {
    const spots = [];
    ['morning','afternoon','evening'].forEach(slot => {
      const s = day[slot];
      if(s && s.spot){
        const [lng, lat] = (s.location||'').split(',').map(Number);
        if (!isNaN(lng) && !isNaN(lat)) {
          spots.push({ name: s.spot, time: slot==='morning'?'上午':slot==='afternoon'?'下午':'晚上', location: s.location, need_booking: s.need_booking, lng, lat, order: globalOrder });
          allMarkers.push({ name: s.spot, lng, lat, order: globalOrder, day: day.day });
          globalOrder++;
        } else {
          spots.push({ name: s.spot, time: slot==='morning'?'上午':slot==='afternoon'?'下午':'晚上', location: '', need_booking: s.need_booking });
        }
      }
    });
    allSpots += spots.length;
    listHtml += `<div class="day-summary">
      <div class="day-summary-header" onclick="toggleDay(${idx})">
        <span class="day-label">Day ${day.day}</span>
        <span class="day-summary-date">${day.date||''}</span>
        <span class="day-arrow" id="dayArrow${idx}">▶</span>
      </div>
      <div class="day-spots" id="daySpots${idx}">`;
    spots.forEach((s, si) => {
      listHtml += `<div class="day-spot">
        <span class="spot-num">${s.order||(si+1)}</span>
        <div class="spot-info"><span class="spot-name">${s.name}${s.need_booking?' ⚠需预约':''}</span><span class="spot-time">${s.time}</span></div>
        ${s.location ? `<span class="spot-loc-icon" onclick="focusSpot('${s.name}',${s.lat},${s.lng})">📍</span>` : ''}
      </div>`;
    });
    listHtml += `</div></div>`;
  });
  document.getElementById('dayList').innerHTML = listHtml;
  document.getElementById('spotSummary').textContent = `共 ${allMarkers.length} 个景点已标注`;

  // 收集酒店和门票预约位置
  const bk = data.booking_info || {};
  (bk.hotels || []).forEach(h => {
    if (h.location) {
      const [lng, lat] = h.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: h.name, lng, lat, order: globalOrder, day: 0, type: 'hotel' });
        globalOrder++;
      }
    }
  });
  (bk.tickets || []).forEach(t => {
    if (t.location && t.need_booking) {
      const [lng, lat] = t.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) {
        allMarkers.push({ name: t.spot, lng, lat, order: globalOrder, day: 0, type: 'ticket' });
        globalOrder++;
      }
    }
  });
  document.getElementById('spotSummary').textContent = `共 ${allMarkers.length} 个地点已标注（含酒店、需预约景点）`;

  // 初始化高德地图
  initOverviewMap(allMarkers);
  window.scrollTo(0,0);
}

// 初始化总览页高德地图
function initOverviewMap(markers) {
  if (typeof AMap === 'undefined') { console.warn('高德地图 SDK 未加载'); return; }
  const container = document.getElementById('overviewMapContainer');
  if (!container) return;

  // 销毁旧地图
  if (overviewMap) { overviewMap.destroy(); overviewMap = null; }

  // 计算中心点
  let centerLng = 116.4, centerLat = 39.9;
  if (markers.length > 0) {
    centerLng = markers.reduce((s,m) => s + m.lng, 0) / markers.length;
    centerLat = markers.reduce((s,m) => s + m.lat, 0) / markers.length;
  }

  overviewMap = new AMap.Map('overviewMapContainer', {
    center: [centerLng, centerLat],
    zoom: markers.length > 1 ? 11 : 13,
    resizeEnable: true,
  });

  // 添加标记点
  markers.forEach(m => {
    let bgColor = '#4A90D9';
    let label = `${m.order}`;
    if (m.type === 'hotel') { bgColor = '#E67E22'; label = '🏨'; }
    else if (m.type === 'ticket') { bgColor = '#E74C3C'; label = '🎫'; }
    const content = `<div style="background:${bgColor};color:#fff;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:700">${label}</div>`;
    const marker = new AMap.Marker({
      position: [m.lng, m.lat],
      content: content,
      offset: new AMap.Pixel(-11, -11),
      title: m.type === 'hotel' ? `🏨 ${m.name}` : m.type === 'ticket' ? `🎫 ${m.name}` : `${m.order}. Day${m.day} ${m.name}`,
    });
    marker.setMap(overviewMap);

    marker.on('click', () => {
      const prefix = m.type === 'hotel' ? '🏨 ' : m.type === 'ticket' ? '🎫 需预约 ' : '';
      const info = new AMap.InfoWindow({
        content: `<div style="padding:4px 8px;font-size:13px"><b>${prefix}${m.name}</b>${m.day ? '<br>Day'+m.day : ''}</div>`,
        offset: new AMap.Pixel(0, -30),
      });
      info.open(overviewMap, [m.lng, m.lat]);
    });
  });

  if (markers.length > 1) {
    overviewMap.setFitView(null, false, [60, 60, 60, 60]);
  }
}

// 点击景点定位图标，聚焦到该景点
function focusSpot(name, lat, lng) {
  if (typeof AMap === 'undefined') return;
  if (overviewMap) {
    overviewMap.setCenter([lng, lat]);
    overviewMap.setZoom(15);
    const info = new AMap.InfoWindow({
      content: `<div style="padding:4px 8px;font-size:13px"><b>${name}</b></div>`,
      offset: new AMap.Pixel(0, -30),
    });
    info.open(overviewMap, [lng, lat]);
  }
}

function toggleDay(idx) {
  const el = document.getElementById('daySpots'+idx);
  const arrow = document.getElementById('dayArrow'+idx);
  if (el.classList.contains('show')) { el.classList.remove('show'); arrow.textContent='▶'; }
  else { el.classList.add('show'); arrow.textContent='▼'; }
}

function goToTrip(){
  if(!tripData) return;
  // 销毁总览地图
  if (overviewMap) { overviewMap.destroy(); overviewMap = null; }
  document.getElementById('overviewPage').style.display='none';
  document.getElementById('tripPage').style.display='block';
  renderTrip(tripData);
  // 启动天气预警和雨雪提醒
  startWeatherAlerts();
  checkRainSnowAlert();
  setInterval(checkRainSnowAlert, 1800000); // 每30分钟检查雨雪
}

function goToOverview(){
  // 销毁行程页地图
  if (dayMap) { dayMap.destroy(); dayMap = null; }
  document.getElementById('tripPage').style.display='none';
  document.getElementById('overviewPage').style.display='flex';
  // 重新初始化总览地图
  setTimeout(() => initOverviewMap(allMarkers), 100);
  window.scrollTo(0,0);
}

function openAmapLink(name, location){
  if(!location) return;
  const [lng, lat] = location.split(',');
  const uri = `https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeURIComponent(name)}&coordinate=gaode&callnative=1`;
  window.open(uri, '_blank');
}

function renderTrip(data){
  tripData = data;
  document.getElementById('tripTitle').textContent = data.destination + data.days + '日游';
  let wHtml = '';
  (data.weather||[]).forEach(w=>{
    wHtml += `<div class="weather-item"><span class="w-icon">${w.icon||'☀️'}</span><span class="w-date">${w.date}</span><span class="w-desc">${w.weather}</span><span class="w-temp">${w.temp}</span></div>`;
  });
  document.getElementById('weatherBar').innerHTML = wHtml;

  let dHtml = '';
  (data.itinerary||[]).forEach((day,dayIdx)=>{
    const w = day.weather||{};
    dHtml += `<div class="day-card">
      <div class="card-header"><span class="day-badge">Day ${day.day}</span><span class="day-date">${day.date}</span><span class="day-weather">${w.icon||''} ${w.desc||''} ${w.temp||''}</span><button class="map-btn" onclick="openDayAmap(${dayIdx})">🗺️ 高德地图</button></div>

function openDayAmap(dayIdx){
  if(!tripData || !tripData.itinerary) return;
  const day = tripData.itinerary[dayIdx];
  if(!day) return;
  const spots = [];
  ['morning','afternoon','evening'].forEach(slot => {
    const s = day[slot];
    if(s && s.spot && s.location){
      const [lng, lat] = s.location.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) spots.push({ name: s.spot, location: s.location, lng, lat });
    }
  });
  if(spots.length === 0) { alert('该天暂无景点坐标'); return; }

  document.getElementById('mapDialogTitle').textContent = (day.date||'Day'+day.day)+' 景点路线';
  document.getElementById('mapOverlay').classList.add('show');

  // 初始化弹窗地图
  setTimeout(() => {
    if (typeof AMap === 'undefined') { console.warn('高德地图 SDK 未加载'); return; }
    const container = document.getElementById('dayMapContainer');
    if (!container) return;
    if (dayMap) { dayMap.destroy(); dayMap = null; }

    const centerLng = spots.reduce((s,m) => s + m.lng, 0) / spots.length;
    const centerLat = spots.reduce((s,m) => s + m.lat, 0) / spots.length;

    dayMap = new AMap.Map('dayMapContainer', {
      center: [centerLng, centerLat],
      zoom: spots.length > 1 ? 12 : 14,
      resizeEnable: true,
    });

    spots.forEach((s, i) => {
      const content = `<div style="background:#4A90D9;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:700">${i+1}</div>`;
      const marker = new AMap.Marker({
        position: [s.lng, s.lat],
        content: content,
        offset: new AMap.Pixel(-12, -12),
        title: s.name,
      });
      marker.setMap(dayMap);
      marker.on('click', () => {
        const info = new AMap.InfoWindow({
          content: `<div style="padding:4px 8px;font-size:13px"><b>${i+1}. ${s.name}</b></div>`,
          offset: new AMap.Pixel(0, -32),
        });
        info.open(dayMap, [s.lng, s.lat]);
      });
    });

    if (spots.length > 1) dayMap.setFitView(null, false, [40, 40, 40, 40]);
  }, 200);

  // 构建景点列表
  let html = '';
  spots.forEach((s, i) => {
    html += `<div class="map-spot-item"><span class="map-spot-num">${i+1}</span><div class="map-spot-info"><span class="map-spot-name">${s.name}</span><span class="map-spot-loc">坐标：${s.location}</span></div></div>`;
  });
  document.getElementById('daySpotList').innerHTML = html;
}
// 酒店地图：显示酒店位置和附近所有景点，方便用户根据景点远近选择酒店
function openHotelMap(hotelIdx){
  if(!tripData || !tripData.booking_info) return;
  const hotels = tripData.booking_info.hotels || [];
  const hotel = hotels[hotelIdx];
  if(!hotel || !hotel.location) return;
  // 收集所有景点坐标
  const spots = [];
  (tripData.itinerary||[]).forEach(day => {
    ['morning','afternoon','evening'].forEach(slot => {
      const s = day[slot];
      if(s && s.spot && s.location){
        const [lng, lat] = s.location.split(',').map(Number);
        if (!isNaN(lng) && !isNaN(lat)) spots.push({ name: s.spot, location: s.location, lng, lat, day: day.day });
      }
    });
  });
  // 解析酒店坐标
  const [hLng, hLat] = hotel.location.split(',').map(Number);
  if (isNaN(hLng) || isNaN(hLat)) return;

  document.getElementById('mapDialogTitle').textContent = hotel.name + ' + 附近景点';
  document.getElementById('mapOverlay').classList.add('show');

  setTimeout(() => {
    if (typeof AMap === 'undefined') { console.warn('高德地图 SDK 未加载'); return; }
    const container = document.getElementById('dayMapContainer');
    if (!container) return;
    if (dayMap) { dayMap.destroy(); dayMap = null; }

    dayMap = new AMap.Map('dayMapContainer', {
      center: [hLng, hLat],
      zoom: 13,
      resizeEnable: true,
    });

    // 酒店标记（红色特殊图标）
    const hotelContent = '<div style="background:#E74C3C;color:#fff;width:32px;height:32px;border-radius:50%;text-align:center;line-height:32px;font-size:16px;box-shadow:0 2px 8px rgba(231,76,60,.4)">🏨</div>';
    const hotelMarker = new AMap.Marker({
      position: [hLng, hLat],
      content: hotelContent,
      offset: new AMap.Pixel(-16, -16),
      title: hotel.name,
      zIndex: 999,
    });
    hotelMarker.setMap(dayMap);
    hotelMarker.on('click', () => {
      new AMap.InfoWindow({
        content: '<div style="padding:6px 10px;font-size:14px"><b>🏨 '+hotel.name+'</b><br><span style="color:#999;font-size:12px">'+hotel.area+'</span></div>',
        offset: new AMap.Pixel(0, -36),
      }).open(dayMap, [hLng, hLat]);
    });

    // 景点标记（蓝色编号）
    spots.forEach((s, i) => {
      const content = '<div style="background:#4A90D9;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:700">'+(i+1)+'</div>';
      const marker = new AMap.Marker({
        position: [s.lng, s.lat],
        content: content,
        offset: new AMap.Pixel(-12, -12),
        title: s.name,
      });
      marker.setMap(dayMap);
      marker.on('click', () => {
        new AMap.InfoWindow({
          content: '<div style="padding:4px 8px;font-size:13px"><b>'+(i+1)+'. '+s.name+'</b><br><span style="color:#999;font-size:11px">Day'+s.day+'</span></div>',
          offset: new AMap.Pixel(0, -32),
        }).open(dayMap, [s.lng, s.lat]);
      });
    });

    // 自动适配视野
    const allPoints = [[hLng, hLat], ...spots.map(s => [s.lng, s.lat])];
    dayMap.setFitView(allPoints, false, [40, 40, 40, 40]);
  }, 200);

  // 构建列表：酒店在最前面（红色），后面是景点（蓝色编号）
  let html = '<div class="map-spot-item"><span class="map-spot-num hotel">🏨</span><div class="map-spot-info"><span class="map-spot-name">'+hotel.name+'</span><span class="map-spot-loc">坐标：'+hotel.location+' | '+hotel.area+'</span></div></div>';
  spots.forEach((s, i) => {
    html += '<div class="map-spot-item"><span class="map-spot-num">'+(i+1)+'</span><div class="map-spot-info"><span class="map-spot-name">'+s.name+'</span><span class="map-spot-loc">坐标：'+s.location+' | Day'+s.day+'</span></div></div>';
  });
  document.getElementById('daySpotList').innerHTML = html;
}

  if (dayMap) { dayMap.destroy(); dayMap = null; }
  document.getElementById('mapOverlay').classList.remove('show');

function shareTrip(){
  if(!tripData) return;
  const canvas = document.createElement('canvas');
  canvas.width = 375; canvas.height = 500;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#4A90D9'; ctx.fillRect(0,0,375,80);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`行旅白 · ${tripData.destination}${tripData.days}日游`, 187, 50);
  ctx.fillStyle = '#333'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left';
  let y = 110;
  (tripData.itinerary||[]).forEach(day => {
    if(y>440) return;
    ctx.fillText(`Day${day.day} | ${day.morning?.spot||''} → ${day.afternoon?.spot||''}`, 20, y);
    y += 24;
  });
  ctx.fillStyle = '#666'; ctx.font = '12px sans-serif';
  (tripData.tips||[]).forEach(t => { if(y>480) return; ctx.fillText(`• ${t}`, 20, y); y+=20; });
  const link = canvas.toDataURL('image/png');
  const a = document.createElement('a'); a.href = link; a.download = `行旅白_${tripData.destination}${tripData.days}日游.png`;
  a.click();
  alert('分享卡片已下载！');
}

// 天气逐时卡片
async function showWeatherHourly(dayIdx) {
  if (!tripData || !tripData.itinerary) return;
  const day = tripData.itinerary[dayIdx];
  if (!day) return;
  const dest = tripData.destination;
  const date = day.date;
  if (!date) return;

  const card = document.getElementById('weatherHourlyCard');
  card.innerHTML = '<div style="text-align:center;padding:40px"><div class="loading-dot" style="background:#4A90D9;display:inline-block;animation:bounce .6s infinite alternate"></div> 加载中...</div>';
  document.getElementById('weatherHourlyOverlay').classList.add('show');

  try {
    const res = await fetch(API + `/api/weather-hourly?city=${encodeURIComponent(dest)}&date=${encodeURIComponent(date)}`);
    const data = await res.json();
    if (!data.success) { card.innerHTML = '<div style="text-align:center;padding:40px;color:#999">天气数据暂不可用</div><button class="wh-close" onclick="closeWeatherHourly()">关闭</button>'; return; }

    // 天气emoji映射
    const emojiMap = { '晴':'☀️','多云':'⛅','阴':'☁️','雨':'🌧️','小雨':'🌦️','中雨':'🌧️','大雨':'🌧️','暴雨':'⛈️','雪':'❄️','小雪':'🌨️','中雪':'❄️','大雪':'❄️','暴雪':'❄️','雾':'🌫️','霾':'🌫️','风':'💨','大风':'💨','雷阵雨':'⛈️','沙尘暴':'🌪️' };
    function getEmoji(w) { for (let k in emojiMap) { if (w.includes(k)) return emojiMap[k]; } return '🌤️'; }

    const now = new Date();
    const currentHour = now.getHours();

    let html = `<div class="wh-header">
      <div class="wh-date">${date} ${dest}</div>
      <div class="wh-summary">白天：${data.day_weather} ${data.day_temp} | 夜间：${data.night_weather} ${data.night_temp}</div>
    </div>`;
    if (data.current) {
      html += `<div class="wh-current">
        <div class="wh-current-temp">${data.current.temp}</div>
        <div class="wh-current-desc">${data.current.weather}</div>
      </div>`;
    }
    if (data.extreme_alert && data.extreme_alert.has_alert) {
      html += '<div style="padding:8px 16px;background:#FFF3E0;color:#E67E22;margin:0 16px;border-radius:8px;font-size:14px">';
      data.extreme_alert.alerts.forEach(a => { html += `⚠️ ${a.message}<br>`; });
      html += '</div>';
    }
    html += '<div class="wh-grid">';
    (data.hours||[]).forEach(h => {
      const isNow = parseInt(h.time) === currentHour;
      html += `<div class="wh-item${isNow ? ' now' : ''}">
        <div class="wh-time">${h.time}${isNow ? ' 现在' : ''}</div>
        <div class="wh-emoji">${getEmoji(h.weather)}</div>
        <div class="wh-temp">${h.temp}</div>
      </div>`;
    });
    html += '</div><button class="wh-close" onclick="closeWeatherHourly()">关闭</button>';
    card.innerHTML = html;
  } catch(e) {
    card.innerHTML = '<div style="text-align:center;padding:40px;color:#999">加载失败，请重试</div><button class="wh-close" onclick="closeWeatherHourly()">关闭</button>';
  }
}
function closeWeatherHourly() { document.getElementById('weatherHourlyOverlay').classList.remove('show'); }

// 极端天气预警检查
let weatherAlertTimer = null;
async function checkWeatherAlerts() {
  if (!tripData || !tripData.destination) return;
  try {
    const res = await fetch(API + '/api/weather-alerts?city=' + encodeURIComponent(tripData.destination));
    const data = await res.json();
    if (data.success && data.alerts && data.alerts.length) {
      const alert = data.alerts[0];
      const bar = document.getElementById('alertBar');
      const msg = document.getElementById('alertMsg');
      msg.textContent = '⚠️ ' + alert.message;
      if (alert.type.includes('雪')) bar.className = 'alert-bar snow show';
      else bar.className = 'alert-bar show';
    }
  } catch(e) {}
}
function closeAlert() { document.getElementById('alertBar').classList.remove('show'); }
// 启动天气预警定时检查（每10分钟）
function startWeatherAlerts() {
  if (weatherAlertTimer) clearInterval(weatherAlertTimer);
  checkWeatherAlerts();
  weatherAlertTimer = setInterval(checkWeatherAlerts, 600000);
}
// 雨雪来临前1小时提醒（需要逐时数据支持）
async function checkRainSnowAlert() {
  if (!tripData || !tripData.destination || !tripData.itinerary) return;
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  // 查找今天是否有行程
  const todayDay = (tripData.itinerary||[]).find(d => d.date === todayStr);
  if (!todayDay) return;
  try {
    const res = await fetch(API + `/api/weather-hourly?city=${encodeURIComponent(tripData.destination)}&date=${encodeURIComponent(todayStr)}`);
    const data = await res.json();
    if (!data.success || !data.hours) return;
    const nowHour = today.getHours();
    // 检查接下来1-2小时是否有雨雪
    const rainSnow = ['雨','雪','暴雨','大雨','中雨','小雨','雷阵雨','暴雪','大雪','中雪','小雪'];
    const nextHour = data.hours.find(h => {
      const hh = parseInt(h.time);
      return hh >= nowHour && hh <= nowHour + 2 && rainSnow.some(r => h.weather.includes(r));
    });
    if (nextHour) {
      const bar = document.getElementById('alertBar');
      const msg = document.getElementById('alertMsg');
      msg.textContent = `🌧️ ${nextHour.time}左右将有${nextHour.weather}，请提前做好准备！`;
      if (nextHour.weather.includes('雪')) bar.className = 'alert-bar snow show';
      else bar.className = 'alert-bar show';
    }
  } catch(e) {}
}
